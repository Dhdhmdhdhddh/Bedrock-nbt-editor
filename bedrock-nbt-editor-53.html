<script>
function readVarint(data, pos) {
  let result = 0, shift = 0;
  while (true) {
    const b = data[pos++];
    result |= (b & 0x7F) << shift;
    if (!(b & 0x80)) break;
    shift += 7;
  }
  return { value: result, pos };
}

function encodeVarint(value) {
  const bytes = [];
  value = value >>> 0;
  while (value > 0x7F) {
    bytes.push((value & 0x7F) | 0x80);
    value >>>= 7;
  }
  bytes.push(value);
  return new Uint8Array(bytes);
}

function concatBytes(...arrs) {
  const total = arrs.reduce((s, a) => s + a.length, 0);
  const out = new Uint8Array(total);
  let o = 0;
  for (const a of arrs) { out.set(a, o); o += a.length; }
  return out;
}

// ---- CRC32C (Castagnoli) - required by LevelDB log record checksums ----
const CRC32C_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) {
      c = (c & 1) ? (0x82F63B78 ^ (c >>> 1)) : (c >>> 1);
    }
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32c(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc = CRC32C_TABLE[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

function maskCrc(crc) {
  const kMaskDelta = 0xa282ead8;
  const rotated = ((crc >>> 15) | (crc << 17)) >>> 0;
  return (rotated + kMaskDelta) >>> 0;
}

// ---- LevelDB log record writer (with block padding + fragmentation) ----
const RECORD_TYPE = { FULL: 1, FIRST: 2, MIDDLE: 3, LAST: 4 };
const LOG_BLOCK_SIZE = 32768;
const LOG_HEADER_SIZE = 7;

function appendLogRecord(logData, payload) {
  let data = logData;
  let pos = 0;
  let first = true;

  if (payload.length === 0) {
    // still need to emit an empty FULL record
    payload = new Uint8Array(0);
  }

  while (true) {
    let offset = data.length;
    let blockOff = offset % LOG_BLOCK_SIZE;
    let remaining = LOG_BLOCK_SIZE - blockOff;

    if (remaining < LOG_HEADER_SIZE) {
      // pad out the rest of this block with zero "trailer" bytes
      data = concatBytes(data, new Uint8Array(remaining));
      remaining = LOG_BLOCK_SIZE;
    }

    const avail = remaining - LOG_HEADER_SIZE;
    const left = payload.length - pos;
    const fragLen = Math.min(avail, left);
    const isLast = (pos + fragLen) === payload.length;

    let type;
    if (first && isLast) type = RECORD_TYPE.FULL;
    else if (first) type = RECORD_TYPE.FIRST;
    else if (isLast) type = RECORD_TYPE.LAST;
    else type = RECORD_TYPE.MIDDLE;

    const frag = payload.slice(pos, pos + fragLen);
    const typeAndData = new Uint8Array(1 + frag.length);
    typeAndData[0] = type;
    typeAndData.set(frag, 1);
    const crc = maskCrc(crc32c(typeAndData));

    const header = new Uint8Array(LOG_HEADER_SIZE);
    const hv = new DataView(header.buffer);
    hv.setUint32(0, crc, true);
    hv.setUint16(4, frag.length, true);
    header[6] = type;

    data = concatBytes(data, header, frag);
    pos += fragLen;
    first = false;

    if (isLast) break;
  }

  return data;
}

class NBTReader {
  constructor(data) {
    this.data = data;
    this.pos = 0;
  }

  u8() { return this.data[this.pos++]; }
  i8() { return this.data[this.pos++] << 24 >> 24; }
  i16() { const v = (this.data[this.pos] | (this.data[this.pos+1] << 8)) << 16 >> 16; this.pos += 2; return v; }
  i32() { const v = this.data[this.pos] | (this.data[this.pos+1] << 8) | (this.data[this.pos+2] << 16) | (this.data[this.pos+3] << 24); this.pos += 4; return v; }
  i64() { const lo = this.i32(), hi = this.i32(); return (hi * 0x100000000) + (lo >>> 0); }
  f32() { const view = new DataView(this.data.buffer, this.data.byteOffset + this.pos, 4); const v = view.getFloat32(0, true); this.pos += 4; return v; }
  f64() { const view = new DataView(this.data.buffer, this.data.byteOffset + this.pos, 8); const v = view.getFloat64(0, true); this.pos += 8; return v; }

  string() {
    const len = this.i16();
    const str = new TextDecoder().decode(this.data.slice(this.pos, this.pos + len));
    this.pos += len;
    return str;
  }

  payload(tagType) {
    if (tagType === TAG.BYTE) return this.i8();
    if (tagType === TAG.SHORT) return this.i16();
    if (tagType === TAG.INT) return this.i32();
    if (tagType === TAG.LONG) return this.i64();
    if (tagType === TAG.FLOAT) return this.f32();
    if (tagType === TAG.DOUBLE) return this.f64();
    if (tagType === TAG.BYTE_ARRAY) {
      const len = this.i32();
      const arr = this.data.slice(this.pos, this.pos + len);
      this.pos += len;
      return arr;
    }
    if (tagType === TAG.STRING) return this.string();
    if (tagType === TAG.LIST) {
      const elemType = this.u8();
      const len = this.i32();
      return { type: elemType, items: Array.from({length: len}, () => this.payload(elemType)) };
    }
    if (tagType === TAG.COMPOUND) {
      const obj = {};
      while (true) {
        const t = this.u8();
        if (t === TAG.END) break;
        const name = this.string();
        obj[name] = { type: t, value: this.payload(t) };
      }
      return obj;
    }
    if (tagType === TAG.INT_ARRAY) {
      const len = this.i32();
      return Array.from({length: len}, () => this.i32());
    }
    if (tagType === TAG.LONG_ARRAY) {
      const len = this.i32();
      return Array.from({length: len}, () => this.i64());
    }
    throw new Error(`Unknown tag type ${tagType}`);
  }

  readRoot() {
    const t = this.u8();
    if (t === TAG.END) return null;
    const name = this.string();
    return { name, type: t, value: this.payload(t) };
  }
}

// ---- NBT Writer: mirrors NBTReader, byte-for-byte compatible ----
class NBTWriter {
  constructor() {
    this.chunks = [];
  }

  pushU8(v) { this.chunks.push(new Uint8Array([v & 0xFF])); }
  pushI16(v) {
    const b = new Uint8Array(2);
    new DataView(b.buffer).setInt16(0, v, true);
    this.chunks.push(b);
  }
  pushI32(v) {
    const b = new Uint8Array(4);
    new DataView(b.buffer).setInt32(0, v, true);
    this.chunks.push(b);
  }
  pushI64(v) {
    // Mirrors NBTReader.i64(): stored value = hi*2^32 + (lo>>>0)
    // bytes[0:4] = lo (LE int32), bytes[4:8] = hi (LE int32)
    v = Math.trunc(v);
    let hi = Math.floor(v / 0x100000000);
    let lo = v - hi * 0x100000000;
    if (lo < 0) { lo += 0x100000000; hi -= 1; }
    const b = new Uint8Array(8);
    const view = new DataView(b.buffer);
    view.setUint32(0, lo, true);
    view.setInt32(4, hi, true);
    this.chunks.push(b);
  }
  pushF32(v) {
    const b = new Uint8Array(4);
    new DataView(b.buffer).setFloat32(0, v, true);
    this.chunks.push(b);
  }
  pushF64(v) {
    const b = new Uint8Array(8);
    new DataView(b.buffer).setFloat64(0, v, true);
    this.chunks.push(b);
  }
  pushString(s) {
    const bytes = new TextEncoder().encode(String(s));
    this.pushI16(bytes.length);
    this.chunks.push(bytes);
  }
  pushBytes(arr) {
    this.chunks.push(arr instanceof Uint8Array ? arr : new Uint8Array(arr));
  }

  writePayload(tagType, value) {
    switch (tagType) {
      case TAG.BYTE: this.pushU8(value); break;
      case TAG.SHORT: this.pushI16(value); break;
      case TAG.INT: this.pushI32(value); break;
      case TAG.LONG: this.pushI64(value); break;
      case TAG.FLOAT: this.pushF32(value); break;
      case TAG.DOUBLE: this.pushF64(value); break;
      case TAG.BYTE_ARRAY:
        this.pushI32(value.length);
        this.pushBytes(value);
        break;
      case TAG.STRING:
        this.pushString(value);
        break;
      case TAG.LIST:
        this.pushU8(value.type);
        this.pushI32(value.items.length);
        for (const item of value.items) this.writePayload(value.type, item);
        break;
      case TAG.COMPOUND:
        for (const key in value) {
          const node = value[key];
          this.pushU8(node.type);
          this.pushString(key);
          this.writePayload(node.type, node.value);
        }
        this.pushU8(TAG.END);
        break;
      case TAG.INT_ARRAY:
        this.pushI32(value.length);
        for (const v of value) this.pushI32(v);
        break;
      case TAG.LONG_ARRAY:
        this.pushI32(value.length);
        for (const v of value) this.pushI64(v);
        break;
      default:
        throw new Error(`Unknown tag type ${tagType}`);
    }
  }

  writeRoot(root) {
    this.pushU8(root.type);
    this.pushString(root.name);
    this.writePayload(root.type, root.value);

    const total = this.chunks.reduce((s, c) => s + c.length, 0);
    const out = new Uint8Array(total);
    let o = 0;
    for (const c of this.chunks) { out.set(c, o); o += c.length; }
    return out;
  }
}

async function readDbFolder(zip) {
  const latestSeq = {};
  const latest = {};
  let globalMaxSeq = 0;
  const debug = { allDbFiles: [], logEntryCounts: {}, ldbEntryCounts: {}, ldbErrors: {} };

  const allFiles = Object.keys(zip.files);
  const isDbFile = f => /(^|\/)db\//.test(f);
  debug.allDbFiles = allFiles.filter(isDbFile);
  debug.allTopFiles = allFiles.filter(f => !isDbFile(f));
  debug.hasLevelDat = allFiles.some(f => f.toLowerCase().endsWith('level.dat'));

  const logFiles = allFiles.filter(f => isDbFile(f) && f.endsWith('.log'));
  for (const logPath of logFiles) {
    const data = await zip.file(logPath).async('uint8array');
    const entries = parseLogFile(data);
    debug.logEntryCounts[logPath] = entries.length;
    debug.logFileSizes = debug.logFileSizes || {};
    debug.logFileSizes[logPath] = data.length;
    debug.logRecordStats = debug.logRecordStats || {};
    debug.logRecordStats[logPath] = { total: entries._totalRecords, byType: entries._recordTypes };
    for (const [key, val, seq] of entries) {
      if (seq > globalMaxSeq) globalMaxSeq = seq;
      const keyStr = new TextDecoder('latin1').decode(key);
      // One-time diagnostic for chunk keys
      if (key.length === 10 && !window.__chunkKeyDiag) {
        window.__chunkKeyDiag = true;
        console.log('RAW chunk key bytes:', Array.from(key).map(b => b.toString(16).padStart(2,'0')).join(' '));
        console.log('Decoded keyStr charCodes:', Array.from({length:keyStr.length},(_,i)=>keyStr.charCodeAt(i).toString(16)).join(' '));
        console.log('keyStr.length:', keyStr.length);
        console.log('tag byte:', keyStr.charCodeAt(8).toString(16));
      }
      if (!latestSeq[keyStr] || seq > latestSeq[keyStr]) {
        latestSeq[keyStr] = seq;
        latest[keyStr] = val;
      }
    }
  }

  const ldbFiles = allFiles.filter(f => isDbFile(f) && f.endsWith('.ldb'));
  for (const ldbPath of ldbFiles) {
    const data = await zip.file(ldbPath).async('uint8array');
    try {
      const entries = parseLdbFile(data);
      debug.ldbEntryCounts[ldbPath] = entries.length;
      for (const [key, val, seq] of entries) {
        if (seq > globalMaxSeq) globalMaxSeq = seq;
        const keyStr = new TextDecoder('latin1').decode(key);
        if (key.length === 10 && !window.__chunkKeyDiagLdb) {
          window.__chunkKeyDiagLdb = true;
          console.log('LDB RAW chunk key bytes:', Array.from(key).map(b => b.toString(16).padStart(2,'0')).join(' '));
          console.log('LDB decoded charCodes:', Array.from({length:keyStr.length},(_,i)=>keyStr.charCodeAt(i).toString(16)).join(' '));
          console.log('LDB tag byte:', keyStr.charCodeAt(8).toString(16), 'expected: 2f');
        }
        if (!latestSeq[keyStr] || seq > latestSeq[keyStr]) {
          latestSeq[keyStr] = seq;
          latest[keyStr] = val;
        }
      }
    } catch (e) {
      debug.ldbErrors[ldbPath] = e.message;
    }
  }

  debug.allKeys = Object.keys(latest);
  window.__nbtDebug = debug;

  // Find the "current" log file (highest numbered .log in /db/) - this is
  // the active write-ahead log that LevelDB will replay on next open.
  let currentLogPath = null;
  let highestNum = -1;
  for (const f of logFiles) {
    const m = f.match(/(\d+)\.log$/);
    if (m) {
      const num = parseInt(m[1], 10);
      if (num > highestNum) { highestNum = num; currentLogPath = f; }
    }
  }

  return { latest, maxSeq: globalMaxSeq, currentLogPath };
}

function parseLogFile(data) {
  const entries = [];
  let pos = 0;
  const BLOCK_SIZE = 32768;
  let totalRecords = 0;
  const recordTypes = {};
  let pending = null; // array of Uint8Array fragments being assembled

  while (pos < data.length) {
    const blockEnd = Math.min(pos + BLOCK_SIZE, data.length);
    let bpos = pos;
    while (bpos + 7 <= blockEnd) {
      const view = new DataView(data.buffer, data.byteOffset + bpos, 7);
      const len = view.getUint16(4, true);
      const rtype = view.getUint8(6);
      bpos += 7;
      if (rtype === 0 && len === 0) break;
      if (bpos + len > data.length) break;

      const chunk = data.slice(bpos, bpos + len);
      bpos += len;

      totalRecords++;
      recordTypes[rtype] = (recordTypes[rtype] || 0) + 1;

      if (rtype === RECORD_TYPE.FULL) {
        entries.push(...parseWriteBatch(chunk));
      } else if (rtype === RECORD_TYPE.FIRST) {
        pending = [chunk];
      } else if (rtype === RECORD_TYPE.MIDDLE) {
        if (pending) pending.push(chunk);
      } else if (rtype === RECORD_TYPE.LAST) {
        if (pending) {
          pending.push(chunk);
          const full = concatBytes(...pending);
          entries.push(...parseWriteBatch(full));
          pending = null;
        }
      }
    }
    pos = blockEnd;
  }
  entries._totalRecords = totalRecords;
  entries._recordTypes = recordTypes;
  return entries;
}

function parseWriteBatch(chunk) {
  const entries = [];
  if (chunk.length < 12) return entries;
  const view = new DataView(chunk.buffer, chunk.byteOffset, 12);
  const seq = Number(view.getBigUint64(0, true));
  const count = view.getUint32(8, true);

  let pos = 12;
  for (let i = 0; i < count; i++) {
    if (pos >= chunk.length) break;
    const tag = chunk[pos++];
    const { value: keylen, pos: p1 } = readVarint(chunk, pos);
    pos = p1;
    const key = chunk.slice(pos, pos + keylen);
    pos += keylen;
    if (tag === 1) {
      const { value: vallen, pos: p2 } = readVarint(chunk, pos);
      pos = p2;
      const val = chunk.slice(pos, pos + vallen);
      pos += vallen;
      entries.push([key, val, seq + i]);
    }
  }
  return entries;
}

function parseLdbFile(data) {
  const entries = [];
  if (data.length < 48) return entries;

  const footer = data.slice(data.length - 48);
  const magic = [0x57, 0xfb, 0x80, 0x8b, 0x24, 0x75, 0x47, 0xdb];
  for (let i = 0; i < 8; i++) if (footer[40+i] !== magic[i]) return entries;

  try {
    let pos = 0;
    const { value: metaOff, pos: p1 } = readVarint(footer, pos);
    pos = p1;
    const { value: metaSize, pos: p2 } = readVarint(footer, pos);
    pos = p2;
    const { value: idxOff, pos: p3 } = readVarint(footer, pos);
    pos = p3;
    const { value: idxSize } = readVarint(footer, pos);

    const idxPayload = data.slice(idxOff, idxOff + idxSize);
    const idxType = data[idxOff + idxSize]; // byte right after payload
    const idxBlock = decompressBlock(idxPayload, idxType);
    
    const indexEntries = parseDataBlockEntries(idxBlock);
    
    for (const [_key, handleBytes] of indexEntries) {
      try {
        let hpos = 0;
        const { value: dOff, pos: hp1 } = readVarint(handleBytes, hpos);
        hpos = hp1;
        const { value: dSize } = readVarint(handleBytes, hpos);
        
        const dataRaw = data.slice(dOff, dOff + dSize);
        const dataType = data[dOff + dSize]; // byte right after payload
        const dataBlock = decompressBlock(dataRaw, dataType);
        
        const dataEntries = parseDataBlockEntries(dataBlock);
        for (const [internalKey, val] of dataEntries) {
          if (internalKey.length < 8) continue;
          
          const userKey = internalKey.slice(0, -8);
          const view = new DataView(internalKey.buffer, internalKey.byteOffset + internalKey.length - 8, 8);
          const seqAndType = view.getBigUint64(0, true);
          const seq = Number(seqAndType >> 8n);
          const rtype = Number(seqAndType & 0xFFn);
          
          if (rtype === 1) {
            if (!window.__ldbKeyDiag && userKey.length >= 9) {
              window.__ldbKeyDiag = true;
              console.log('LDB userKey length:', userKey.length, 'bytes:', Array.from(userKey).map(b=>b.toString(16).padStart(2,'0')).join(' '));
              console.log('internalKey length:', internalKey.length);
            }
            entries.push([userKey, val, seq]);
          }
        }
      } catch (e) {}
    }
  } catch (e) {}

  return entries;
}

function parseDataBlockEntries(block) {
  const entries = [];
  if (block.length < 4) return entries;
  
  const view = new DataView(block.buffer, block.byteOffset + block.length - 4, 4);
  const numRestarts = view.getUint32(0, true);
  const contentEnd = block.length - 4 - (numRestarts * 4);

  let pos = 0;
  let prevKey = new Uint8Array(0);
  
  while (pos < contentEnd) {
    const { value: shared, pos: p1 } = readVarint(block, pos);
    pos = p1;
    const { value: unshared, pos: p2 } = readVarint(block, pos);
    pos = p2;
    const { value: vallen, pos: p3 } = readVarint(block, pos);
    pos = p3;
    
    const keyDelta = block.slice(pos, pos + unshared);
    pos += unshared;
    const val = block.slice(pos, pos + vallen);
    pos += vallen;
    
    const key = new Uint8Array(shared + unshared);
    key.set(prevKey.slice(0, shared), 0);
    key.set(keyDelta, shared);
    
    entries.push([key, val]);
    prevKey = key;
  }

  return entries;
}

function decompressBlock(data, compressionType) {
  if (compressionType === 0) return data;

  // Try Snappy first for known snappy types, or as fallback for any type
  const trySnappy = () => {
    if (typeof SnappyJS === 'undefined') return null;
    try {
      const result = new Uint8Array(SnappyJS.uncompress(data));
      // Validate: snappy output should be larger than input for real data,
      // or at minimum the varint-encoded uncompressed length at the start should match
      if (result.length > 0) return result;
    } catch (_) {}
    return null;
  };

  const tryZlib = () => {
    try { return new Uint8Array(pako.inflate(data)); } catch (_) {}
    try { return new Uint8Array(pako.inflateRaw(data)); } catch (_) {}
    return null;
  };

  // Bedrock uses Snappy (0x04 in newer versions, 0x01 / 0x40 / 0x80 in older)
  // zlib is 0x02. Try the most likely method first, then fall back to the other.
  if (compressionType === 0x02) {
    return tryZlib() || trySnappy() || data;
  }
  // For all other non-zero types (0x01, 0x04, 0x40, 0x80, unknown), try snappy first
  return trySnappy() || tryZlib() || data;
}

let currentPlayerNBT = null;
let currentZip = null;
let currentLogPath = null;
let currentMaxSeq = 0;

// Undo stack — each entry stores the log snapshot before the change
const undoStack = [];
function pushUndo(label, logSnapshot, seqSnapshot) {
  undoStack.push({ label, logSnapshot: logSnapshot.slice(), seqSnapshot });
  updateUndoBtn();
}
function updateUndoBtn() {
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  if (undoStack.length === 0) {
    btn.disabled = true;
    btn.textContent = 'Undo';
  } else {
    btn.disabled = false;
    btn.textContent = `Undo: ${undoStack[undoStack.length-1].label}`;
  }
}
async function undoLast() {
  if (!undoStack.length || !currentZip || !currentLogPath) return;
  const { label, logSnapshot, seqSnapshot } = undoStack.pop();
  currentZip.file(currentLogPath, logSnapshot);
  currentMaxSeq = seqSnapshot;
  updateUndoBtn();
  if (undoStack.length === 0) document.getElementById('saveBtn').disabled = false;
  showStatus(`Undid: ${label}`);
}
let currentLevelNBT = null;
let currentLevelDatPath = null;
let currentLevelDatVersion = 0;
const PLAYER_KEY = '~local_player';

function showStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.add('show');
  if (isError) el.classList.add('error');
  else el.classList.remove('error');
}

// Triggers a file download from a Blob, with a fallback for iOS.
// iOS Safari (and every other iOS browser — they all use WebKit) only treats a
// click as "user-initiated" for a brief moment after an actual tap. Any async
// work (like zipping a world) done between the tap and the download click can
// make iOS silently ignore the auto-download. So we still attempt the normal
// auto-click (which works fine on desktop/Android and often on iOS too), but we
// also leave a real, tappable link behind so the user always has a way to
// finish the download with a fresh, genuine tap.
function triggerDownload(blob, filename, successMsg) {
  const url = URL.createObjectURL(blob);

  try {
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) { /* ignore — the fallback link below still works */ }

  const el = document.getElementById('status');
  el.innerHTML = '';
  el.classList.add('show');
  el.classList.remove('error');
  const msgLine = document.createElement('div');
  msgLine.textContent = successMsg || `Saved ${filename}`;
  el.appendChild(msgLine);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.textContent = `⬇️ If the download didn't start, tap here: ${filename}`;
  link.style.cssText = 'display:inline-block;margin-top:8px;padding:8px 14px;background:#0066cc;color:#fff;border-radius:4px;text-decoration:none;font-size:13px;font-weight:600;';
  link.onclick = () => { setTimeout(() => URL.revokeObjectURL(url), 60000); };
  el.appendChild(link);
}

async function loadWorld() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { showStatus('No file selected', true); return; }

  try {
    showStatus('Loading...');
    const zip = await JSZip.loadAsync(file);
    const { latest, maxSeq, currentLogPath: logPath } = await readDbFolder(zip);

    const rawPlayer = latest[PLAYER_KEY];
    if (!rawPlayer) {
      const dbg = window.__nbtDebug;
      const keyList = dbg.allKeys.length ? dbg.allKeys.slice(0, 30).join(', ') : '(none)';
      const fileList = dbg.allDbFiles.join(', ') || '(no /db/ files found)';
      const ldbErrs = Object.entries(dbg.ldbErrors).map(([f,e]) => `${f}: ${e}`).join(' | ');
      showStatus(
        `No ~local_player found.\n` +
        `db/ files: ${fileList}\n` +
        `other files: ${dbg.allTopFiles.join(', ')}\n` +
        `has level.dat: ${dbg.hasLevelDat}\n` +
        `log sizes: ${JSON.stringify(dbg.logFileSizes)}\n` +
        `log record stats: ${JSON.stringify(dbg.logRecordStats)}\n` +
        `Keys found (${dbg.allKeys.length}): ${keyList}` +
        (dbg.allKeys.length > 30 ? '...' : '') +
        (ldbErrs ? `\nLDB errors: ${ldbErrs}` : ''),
        true
      );
      return;
    }
    if (!logPath) { showStatus('Could not find an active .log file in /db/ - saving will not work for this world', true); }

    const reader = new NBTReader(rawPlayer);
    currentPlayerNBT = reader.readRoot();
    currentZip = zip;
    currentLogPath = logPath;
    currentMaxSeq = maxSeq;
    window.__loadedDb = latest; // store for chunk pruner key scanning

    // Parse level.dat (separate file at world root, not in the leveldb db)
    currentLevelNBT = null;
    currentLevelDatPath = null;
    const allFiles = Object.keys(zip.files);
    const levelDatPath = allFiles.find(f => /(^|\/)level\.dat$/.test(f));
    if (levelDatPath) {
      try {
        const raw = await zip.file(levelDatPath).async('uint8array');
        const dv = new DataView(raw.buffer, raw.byteOffset, raw.length);
        const version = dv.getInt32(0, true);
        const nbtLen = dv.getInt32(4, true);
        const nbtBytes = raw.slice(8, 8 + nbtLen);
        const lvlReader = new NBTReader(nbtBytes);
        currentLevelNBT = lvlReader.readRoot();
        currentLevelDatPath = levelDatPath;
        currentLevelDatVersion = version;
      } catch (e) {
        console.warn('Could not parse level.dat:', e);
      }
    }

    renderTabs(currentPlayerNBT.value);
    document.getElementById('saveBtn').disabled = !logPath;
    document.getElementById('tabs-container').style.display = 'block';
    showStatus('Loaded successfully');
  } catch (e) {
    showStatus(`Error: ${e.message}`, true);
  }
}

function renderTabs(playerData) {
  const tabs = document.getElementById('tabs');
  const contents = document.getElementById('tab-contents');
  tabs.innerHTML = '';
  contents.innerHTML = '';

  const tabMap = {
    'Inventory': playerData.Inventory,
    'EnderChest': playerData.EnderChestInventory,
    'Attributes': playerData.Attributes,
    'Pos': playerData.Pos,
    'Rotation': playerData.Rotation,
    'Offhand': playerData.Offhand,
    'Tools': 'INV_TOOLS',
    'Chunk Pruner': 'CHUNK_PRUNER',
  };

  // "Stats" tab: gamemode, XP, health, hunger
  tabMap['Stats'] = 'STATS';

  // "Other" tab: everything else at the player root
  const coveredKeys = ['Inventory', 'EnderChestInventory', 'Attributes', 'Pos', 'Rotation', 'Offhand',
    'PlayerGameMode', 'PlayerLevel', 'PlayerLevelProgress'];
  const otherData = {};
  for (const key in playerData) {
    if (!coveredKeys.includes(key)) otherData[key] = playerData[key];
  }
  if (Object.keys(otherData).length > 0) {
    tabMap['Other'] = { type: TAG.COMPOUND, value: otherData };
  }

  // "World" tab: level.dat settings (achievements, days played, etc.)
  if (currentLevelNBT) {
    tabMap['World'] = currentLevelNBT;
  }

  // "Entities" tab: always available if world is loaded
  if (window.__loadedDb) {
    tabMap['Entities'] = 'ENTITIES';
  }

  // "Illegal Items" tab: always available (builder UI, not data-driven)
  tabMap['Illegal Items'] = 'BUILDER';


  let firstTab = true;
  for (const [tabName, data] of Object.entries(tabMap)) {
    if (!data) continue;

    const btn = document.createElement('button');
    btn.className = `tab-btn ${firstTab ? 'active' : ''}`;
    btn.textContent = tabName;
    btn.onclick = () => {
      switchTab(tabName);
      if (tabName === 'EnderChest') {
        const now = Date.now();
        enderTapCount = (now - lastEnderTapTime < 1500) ? enderTapCount + 1 : 1;
        lastEnderTapTime = now;
        if (enderTapCount >= 7) {
          enderTapCount = 0;
          openDebugPanel();
        }
      }
    };
    tabs.appendChild(btn);

    const content = document.createElement('div');
    content.id = `tab-${tabName}`;
    content.className = `tab-content ${firstTab ? 'active' : ''}`;

    if (data === 'BUILDER') {
      renderIllegalItemsTab(content);
    } else if (data === 'STATS') {
      renderStatsTab(content, playerData);
    } else if (data === 'ENTITIES') {
      renderEntitiesTab(content);
    } else if (data === 'INV_TOOLS') {
      renderInventoryTools(content);
    } else if (data === 'ITEM_SHEET') {
      renderItemSheetTab(content);
    } else if (data === 'CHUNK_PRUNER') {
      renderChunkPruner(content);
    } else if ((tabName === 'Inventory' || tabName === 'EnderChest' || tabName === 'Offhand') && data) {
      renderItemList(data.value?.items || [], content);
    } else if (data && data.type === TAG.LIST) {
      renderList(data, content);
    } else if (data) {
      renderCompound(data.value, content);
    }

    contents.appendChild(content);
    firstTab = false;
  }
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  
  event.target.classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

const TEXTURE_BASE = 'https://cdn.jsdelivr.net/gh/Mojang/bedrock-samples@main/resource_pack/textures';
const JAVA_TEXTURE_BASE = 'https://raw.githubusercontent.com/InventivetalentDev/minecraft-assets/1.21/assets/minecraft/textures';

function createItemIcon(identifier, size, onResult) {
  const wrapper = document.createElement('div');
  wrapper.className = 'item-icon';
  wrapper.style.width = size + 'px';
  wrapper.style.height = size + 'px';

  const name = (identifier || 'minecraft:air').replace('minecraft:', '');
  const urls = [];
  const override = ITEM_TEXTURE_OVERRIDES[name];
  if (override) {
    if (override.startsWith('java:')) {
      urls.push(`${JAVA_TEXTURE_BASE}/${override.slice(5)}.png`);
    } else {
      urls.push(`${TEXTURE_BASE}/${override}.png`);
    }
  }
  urls.push(`${TEXTURE_BASE}/items/${name}.png`, `${TEXTURE_BASE}/blocks/${name}.png`);

  const img = document.createElement('img');
  img.alt = '';
  img.loading = 'lazy';

  let urlIdx = 0;
  img.onerror = () => {
    if (urlIdx < urls.length) {
      img.src = urls[urlIdx++];
    } else {
      wrapper.innerHTML = '';
      wrapper.classList.add('item-icon-fallback');
      wrapper.textContent = name.slice(0, 2).toUpperCase();
      if (onResult) onResult(false);
    }
  };
  img.onload = () => { if (onResult) onResult(true); };
  img.src = urls[urlIdx++];

  wrapper.appendChild(img);

function openDebugPanel() {
  const overlay = document.createElement('div');
  overlay.className = 'ench-overlay';

  const panel = document.createElement('div');
  panel.className = 'ench-panel';
  panel.style.maxWidth = '700px';

  const title = document.createElement('h3');
  title.textContent = 'Debug / Testing Panel';
  panel.appendChild(title);

  // --- Enchantment ID reference ---
  const enchTitle = document.createElement('h4');
  enchTitle.textContent = 'Enchantment IDs';
  enchTitle.style.margin = '10px 0 6px 0';
  panel.appendChild(enchTitle);

  const enchTable = document.createElement('div');
  enchTable.style.cssText = 'display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:4px;font-size:12px;max-height:160px;overflow-y:auto;border:1px solid #2a2a2a;padding:6px;margin-bottom:14px;';
  for (const [id, ename] of ENCHANTMENTS) {
    const cell = document.createElement('div');
    cell.textContent = `${id}: ${ename}`;
    cell.style.color = '#7fd17a';
    enchTable.appendChild(cell);
  }
  panel.appendChild(enchTable);

  // --- Texture tester ---
  const texTitle = document.createElement('h4');
  texTitle.textContent = 'Texture Tester';
  texTitle.style.margin = '10px 0 6px 0';
  panel.appendChild(texTitle);

  const texInputRow = document.createElement('div');
  texInputRow.style.cssText = 'display:flex;gap:8px;margin-bottom:8px;';
  const texInput = document.createElement('input');
  texInput.className = 'edit-field';
  texInput.placeholder = 'minecraft:item_id';
  texInput.style.flex = '1';
  const texBtn = document.createElement('button');
  texBtn.textContent = 'Test';
  const texResult = document.createElement('div');
  texResult.style.marginBottom = '10px';
  texBtn.onclick = () => {
    texResult.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;align-items:center;gap:8px;';
    wrap.appendChild(createItemIcon(texInput.value.trim(), 40));
    const label = document.createElement('div');
    label.textContent = texInput.value.trim() || '(empty)';
    label.style.fontFamily = 'monospace';
    label.style.fontSize = '12px';
    wrap.appendChild(label);
    texResult.appendChild(wrap);
  };
  texInputRow.appendChild(texInput);
  texInputRow.appendChild(texBtn);
  panel.appendChild(texInputRow);
  panel.appendChild(texResult);

  const commonLabel = document.createElement('div');
  commonLabel.className = 'property-key';
  commonLabel.textContent = 'Common item icons (sanity check)';
  commonLabel.style.marginBottom = '6px';
  panel.appendChild(commonLabel);

  const commonGrid = document.createElement('div');
  commonGrid.className = 'item-grid';
  commonGrid.style.marginBottom = '14px';
  for (const id of COMMON_ITEMS) {
    const tile = document.createElement('div');
    tile.className = 'item-tile';
    tile.style.cursor = 'default';

    }
  };
  itemDiv.appendChild(rawToggle);
  itemDiv.appendChild(rawDiv);
}

const NBT_TYPE_NAMES = {
  0: 'End', 1: 'Byte', 2: 'Short', 3: 'Int', 4: 'Long', 5: 'Float', 6: 'Double',
  7: 'ByteArray', 8: 'String', 9: 'List', 10: 'Compound', 11: 'IntArray', 12: 'LongArray'
};

const NBT_ADDABLE_TYPES = [
  [TAG.BYTE, 'Byte'], [TAG.SHORT, 'Short'], [TAG.INT, 'Int'], [TAG.LONG, 'Long'],
  [TAG.FLOAT, 'Float'], [TAG.DOUBLE, 'Double'], [TAG.STRING, 'String'],
  [TAG.LIST, 'List'], [TAG.COMPOUND, 'Compound']
];

function defaultValueForType(type) {
  switch (type) {
    case TAG.BYTE: case TAG.SHORT: case TAG.INT: case TAG.LONG:
    case TAG.FLOAT: case TAG.DOUBLE: return 0;
    case TAG.STRING: return '';
    case TAG.LIST: return { type: TAG.COMPOUND, items: [] };
    case TAG.COMPOUND: return {};
    case TAG.BYTE_ARRAY: return new Uint8Array(0);
    case TAG.INT_ARRAY: case TAG.LONG_ARRAY: return [];
    default: return 0;
  }
}

// Render a compound (object of key -> {type, value}) as an editable tree
function renderNbtCompound(compound, container, isRoot) {
  container.innerHTML = '';
  for (const key of Object.keys(compound)) {
    renderNbtNode(compound, key, container);
  }
  // Add-key control
  const addRow = document.createElement('div');
  addRow.className = 'nbt-add-row';
  const keyInput = document.createElement('input');
  keyInput.className = 'edit-field';
  keyInput.placeholder = 'new key';
  keyInput.style.cssText = 'width:120px;font-size:12px;padding:3px 6px;';
  const typeSelect = document.createElement('select');
  typeSelect.className = 'edit-field';
  typeSelect.style.cssText = 'width:auto;font-size:12px;padding:3px 6px;';
  for (const [t, label] of NBT_ADDABLE_TYPES) {
    const o = document.createElement('option'); o.value = t; o.textContent = label; typeSelect.appendChild(o);
  }
  const addBtn = document.createElement('button');
  addBtn.textContent = '+ Add Key';
  addBtn.style.cssText = 'padding:3px 8px;font-size:11px;background:#226622;';
  addBtn.onclick = () => {
    const k = keyInput.value.trim();
    if (!k) return;
    if (compound[k]) { showStatus(`Key "${k}" already exists`, true); return; }
    const t = parseInt(typeSelect.value, 10);
    compound[k] = { type: t, value: defaultValueForType(t) };
    renderNbtCompound(compound, container, isRoot);
  };
  addRow.appendChild(keyInput);
  addRow.appendChild(typeSelect);
  addRow.appendChild(addBtn);
  container.appendChild(addRow);
}

// Render a single key/value node within a compound
function renderNbtNode(parentCompound, key, container) {
  const node = parentCompound[key];
  const row = document.createElement('div');
  row.className = 'nbt-node';

  const head = document.createElement('div');
  head.className = 'nbt-node-head';

  const typeBadge = document.createElement('span');
  typeBadge.className = 'nbt-type-badge';
  typeBadge.textContent = NBT_TYPE_NAMES[node.type] || node.type;

  const keySpan = document.createElement('span');
  keySpan.className = 'nbt-key';
  keySpan.textContent = key;

  const delBtn = document.createElement('button');
  delBtn.textContent = '×';
  delBtn.title = 'Delete key';
  delBtn.className = 'nbt-del';
  delBtn.onclick = () => {
    delete parentCompound[key];
    row.remove();
  };

  head.appendChild(typeBadge);
  head.appendChild(keySpan);

  if (node.type === TAG.COMPOUND) {
    const toggle = document.createElement('span');
    toggle.className = 'nbt-toggle';
    toggle.textContent = '▸';
    const childWrap = document.createElement('div');
    childWrap.className = 'nbt-children';
    childWrap.style.display = 'none';
    let built = false;
    toggle.onclick = () => {
      const open = childWrap.style.display !== 'none';
      childWrap.style.display = open ? 'none' : 'block';
      toggle.textContent = open ? '▸' : '▾';
      if (!open && !built) { built = true; renderNbtCompound(node.value, childWrap, false); }
    };
    head.insertBefore(toggle, typeBadge);
    head.appendChild(delBtn);
    row.appendChild(head);
    row.appendChild(childWrap);
  } else if (node.type === TAG.LIST) {
    const toggle = document.createElement('span');
    toggle.className = 'nbt-toggle';
    toggle.textContent = '▸';
    const elemTypeName = NBT_TYPE_NAMES[node.value.type] || node.value.type;
    const lenSpan = document.createElement('span');
    lenSpan.className = 'nbt-meta';
    lenSpan.textContent = `<${elemTypeName}> [${node.value.items.length}]`;
    const childWrap = document.createElement('div');
    childWrap.className = 'nbt-children';
    childWrap.style.display = 'none';
    let built = false;
    const buildList = () => {
      childWrap.innerHTML = '';
      node.value.items.forEach((item, idx) => {
        const itemRow = document.createElement('div');
        itemRow.className = 'nbt-node';
        if (node.value.type === TAG.COMPOUND) {
          const ihead = document.createElement('div');
          ihead.className = 'nbt-node-head';
          const itoggle = document.createElement('span');
          itoggle.className = 'nbt-toggle';
          itoggle.textContent = '▸';
          const ilabel = document.createElement('span');
          ilabel.className = 'nbt-key';
          ilabel.textContent = `[${idx}]`;
          const idel = document.createElement('button');
          idel.textContent = '×'; idel.className = 'nbt-del';
          idel.onclick = () => { node.value.items.splice(idx, 1); buildList(); };
          const icw = document.createElement('div');
          icw.className = 'nbt-children';
          icw.style.display = 'none';
          let ibuilt = false;
          itoggle.onclick = () => {
            const op = icw.style.display !== 'none';
            icw.style.display = op ? 'none' : 'block';
            itoggle.textContent = op ? '▸' : '▾';
            if (!op && !ibuilt) { ibuilt = true; renderNbtCompound(item, icw, false); }
          };
          ihead.appendChild(itoggle);
          ihead.appendChild(ilabel);
          ihead.appendChild(idel);
          itemRow.appendChild(ihead);
          itemRow.appendChild(icw);
        } else {
          // primitive list element
          const ihead = document.createElement('div');
          ihead.className = 'nbt-node-head';
          const ilabel = document.createElement('span');
          ilabel.className = 'nbt-key';
          ilabel.textContent = `[${idx}]`;
          const valSpan = document.createElement('span');
          valSpan.className = 'nbt-value editable';
          valSpan.textContent = String(item);
          if (EDITABLE_TYPES.includes(node.value.type)) {
            const proxy = { type: node.value.type, value: item };
            valSpan.onclick = () => editValue(proxy, valSpan, () => { node.value.items[idx] = proxy.value; });
          }
          const idel = document.createElement('button');
          idel.textContent = '×'; idel.className = 'nbt-del';
          idel.onclick = () => { node.value.items.splice(idx, 1); buildList(); };
          ihead.appendChild(ilabel);
          ihead.appendChild(valSpan);
          ihead.appendChild(idel);
          itemRow.appendChild(ihead);
        }
        childWrap.appendChild(itemRow);
      });
      // add-element button
      const addEl = document.createElement('button');
      addEl.textContent = '+ Add Element';
      addEl.style.cssText = 'padding:2px 8px;font-size:11px;background:#226622;margin-top:4px;';
      addEl.onclick = () => {
        const t = node.value.type;
        if (t === TAG.COMPOUND) node.value.items.push({});
        else node.value.items.push(defaultValueForType(t));
        buildList();
        lenSpan.textContent = `<${elemTypeName}> [${node.value.items.length}]`;
      };
      childWrap.appendChild(addEl);
    };
    toggle.onclick = () => {
      const open = childWrap.style.display !== 'none';
      childWrap.style.display = open ? 'none' : 'block';
      toggle.textContent = open ? '▸' : '▾';
      if (!open && !built) { built = true; buildList(); }
    };
    head.insertBefore(toggle, typeBadge);
    head.appendChild(lenSpan);
    head.appendChild(delBtn);
    row.appendChild(head);
    row.appendChild(childWrap);
  } else if (node.type === TAG.BYTE_ARRAY || node.type === TAG.INT_ARRAY || node.type === TAG.LONG_ARRAY) {
    const meta = document.createElement('span');
    meta.className = 'nbt-meta';
    const len = node.value instanceof Uint8Array ? node.value.length : node.value.length;
    meta.textContent = `[${len} entries]`;
    head.appendChild(meta);
    head.appendChild(delBtn);
    row.appendChild(head);
  } else {
    // primitive: editable inline
    const valSpan = document.createElement('span');
    valSpan.className = 'nbt-value editable';
    valSpan.textContent = String(node.value);
    if (EDITABLE_TYPES.includes(node.type)) {
      valSpan.onclick = () => editValue(node, valSpan, () => { valSpan.textContent = String(node.value); });
    }
    head.appendChild(valSpan);
    head.appendChild(delBtn);
    row.appendChild(head);
  }

  container.appendChild(row);
}

function packItemsIntoShulkers(items, shulkerName) {
  // Filter out empty/air items
  const realItems = items.filter(i => i && i.Name && i.Name.value && i.Name.value !== 'minecraft:air' && (i.Count?.value ?? 0) > 0);
  if (realItems.length === 0) return [];

  const SLOTS_PER_SHULKER = 27;

  function makeShulkerWithItems(contents, slot) {
    return {
      Name: { type: TAG.STRING, value: shulkerName || 'minecraft:shulker_box' },
      Count: { type: TAG.BYTE, value: 1 },
      Slot: { type: TAG.BYTE, value: slot },
      Damage: { type: TAG.SHORT, value: 0 },
      tag: { type: TAG.COMPOUND, value: {
        Items: { type: TAG.LIST, value: { type: TAG.COMPOUND, items: contents } }
      }}
    };
  }

  // Re-slot items starting from 0
  const reslotted = realItems.map((item, i) => ({
    ...item,
    Slot: { type: TAG.BYTE, value: i % SLOTS_PER_SHULKER }
  }));

  // Chunk into groups of 27
  const chunks = [];
  for (let i = 0; i < reslotted.length; i += SLOTS_PER_SHULKER) {
    chunks.push(reslotted.slice(i, i + SLOTS_PER_SHULKER));
  }

  if (chunks.length <= SLOTS_PER_SHULKER) {
    // All fits in one level of shulkers placed in inventory slots 0..N
    return chunks.map((chunk, i) => makeShulkerWithItems(chunk, i));
  } else {
    // Need nesting: pack shulkers into shulkers
    const firstLevelShulkers = chunks.map((chunk, i) => makeShulkerWithItems(chunk, i % SLOTS_PER_SHULKER));
    const nestedChunks = [];
    for (let i = 0; i < firstLevelShulkers.length; i += SLOTS_PER_SHULKER) {
      nestedChunks.push(firstLevelShulkers.slice(i, i + SLOTS_PER_SHULKER));
    }
    return nestedChunks.map((chunk, i) => makeShulkerWithItems(chunk, i));
  }
}

async function loadWorldDb(file) {
  const JSZipLib = window.JSZip;
  const zip = await JSZipLib.loadAsync(file);
  const allFiles = Object.keys(zip.files);
  const isDbFile = f => /(^|\/)db\//.test(f);
  const latestSeq = {}; const latest = {}; let maxSeq = 0;
  let currentLogPath = null; let highestLogNum = -1;

  const logFiles = allFiles.filter(f => isDbFile(f) && f.endsWith('.log'));
  for (const lf of logFiles) {
    const data = await zip.file(lf).async('uint8array');
    const entries = parseLogFile(data);
    for (const [key, val, seq] of entries) {
      if (seq > maxSeq) maxSeq = seq;
      const ks = new TextDecoder('latin1').decode(key);
      if (!latestSeq[ks] || seq > latestSeq[ks]) { latestSeq[ks] = seq; latest[ks] = val; }
    }
    const m = lf.match(/(\d+)\.log$/);
    if (m && parseInt(m[1]) > highestLogNum) { highestLogNum = parseInt(m[1]); currentLogPath = lf; }
  }

  const ldbFiles = allFiles.filter(f => isDbFile(f) && f.endsWith('.ldb'));
  for (const lf of ldbFiles) {
    const data = await zip.file(lf).async('uint8array');
    const entries = parseLdbFile(data);
    for (const [key, val, seq] of entries) {
      if (seq > maxSeq) maxSeq = seq;
      const ks = new TextDecoder('latin1').decode(key);
      if (!latestSeq[ks] || seq > latestSeq[ks]) { latestSeq[ks] = seq; latest[ks] = val; }
    }
  }

  return { zip, latest, maxSeq, currentLogPath };
}

function buildTool(id, container) {

function chunkKeyPrefix(cx, cz, dimension) {
  // Bedrock chunk key prefix: 4-byte LE x + 4-byte LE z (+ 4-byte LE dimension if not overworld)
  const buf = new ArrayBuffer(dimension === 0 ? 8 : 12);
  const view = new DataView(buf);
  view.setInt32(0, cx, true);
  view.setInt32(4, cz, true);
  if (dimension !== 0) view.setInt32(8, dimension, true);
  return new Uint8Array(buf);
}

function findChunkKeys(db, cx, cz, dimension) {
  const prefix = chunkKeyPrefix(cx, cz, dimension);
  const matching = [];
  for (const keyStr of Object.keys(db)) {
    if (keyStr.length < prefix.length) continue;
    let match = true;
    for (let i = 0; i < prefix.length; i++) {
      if ((keyStr.charCodeAt(i) & 0xff) !== prefix[i]) { match = false; break; }
    }
    if (match) matching.push(keyStr);
  }
  return matching;
}

function writePutBatch(entries, baseSeq) {
  // entries: array of [keyStr, Uint8Array value]
  const batchHeader = new Uint8Array(12);
  const bhView = new DataView(batchHeader.buffer);
  bhView.setUint32(0, baseSeq, true);
  bhView.setUint32(4, 0, true);
  bhView.setUint32(8, entries.length, true);
  const parts = [batchHeader];
  for (const [keyStr, val] of entries) {
    const keyBytes = new Uint8Array([...keyStr].map(c => c.charCodeAt(0)));
    const valBytes = val instanceof Uint8Array ? val : new Uint8Array(val);
    parts.push(new Uint8Array([1])); // tag 1 = put
    parts.push(encodeVarint(keyBytes.length));
    parts.push(keyBytes);
    parts.push(encodeVarint(valBytes.length));
    parts.push(valBytes);
  }
  return concatBytes(...parts);
}

function writeDeleteBatch(keyStrs, baseSeq) {
  // Build a LevelDB WriteBatch with deletion records for each key
  const keyBytesList = keyStrs.map(k => new Uint8Array([...k].map(c => c.charCodeAt(0))));
  const batchHeader = new Uint8Array(12);
  const bhView = new DataView(batchHeader.buffer);
  bhView.setUint32(0, baseSeq, true);
  bhView.setUint32(4, 0, true);
  bhView.setUint32(8, keyStrs.length, true);

  const parts = [batchHeader];
  for (const keyBytes of keyBytesList) {
    parts.push(new Uint8Array([0])); // tag 0 = deletion
    parts.push(encodeVarint(keyBytes.length));
    parts.push(keyBytes);
  }
  return concatBytes(...parts);
}

// ============================================================
// Sub-chunk parser
// ============================================================
function parseSubchunk(data) {
  if (!data || data.length < 3) return [];
  if (data.length > 262144) { console.warn('Skipping oversized sub-chunk:', data.length); return []; }
  let pos = 0;
  const version = data[pos++];
  let blocks = null;

  // Version 1 = old format (flat 4096 bytes of block IDs, no palette)
  if (version === 1) {
    const blockIds = data.slice(pos, pos + 4096);
    return Array.from(blockIds).map(id => `minecraft:${id}`);
  }

  // Version 8/9 = paletted format
  const numStorages = data[pos++];

  for (let s = 0; s < numStorages; s++) {
    const extraByte = data[pos++];  // storage flags/version byte (e.g. 0x03)
    const bitsByte = data[pos++];   // actual bits-per-block byte (e.g. 0x08 = 4 bits)
    const bits = bitsByte >> 1;

    // 0xfc-0xff are special "network/runtime" storage formats where there are no
    // packed block words - just a palette count followed by palette entries.
    // Treat as uniform (all blocks = palette[0]).
    const isSpecialFormat = bitsByte >= 0xfc;

    // Sanity check: valid persistent bit widths are 0,1,2,3,4,5,6,8,16
    if (!isSpecialFormat && bits > 16) {
      console.warn(`Skipping storage with invalid bits=${bits} (bitsByte=0x${bitsByte.toString(16)})`);
      break;
    }

    let indices;
    if (isSpecialFormat || bits === 0) {
      indices = new Array(4096).fill(0);
    } else {
      const bpw = Math.floor(32 / bits);
      const wc = Math.ceil(4096 / bpw);
      // Sanity check: block data shouldn't exceed remaining data
      if (pos + wc * 4 > data.length) {
        console.warn(`Skipping storage: block data overflows (need ${wc*4} bytes, have ${data.length-pos})`);
        break;
      }
      const mask = (1 << bits) - 1;
      indices = [];
      for (let w = 0; w < wc; w++) {
        const word = data[pos] | (data[pos+1]<<8) | (data[pos+2]<<16) | (data[pos+3]<<24);
        pos += 4;
        for (let b = 0; b < bpw && indices.length < 4096; b++) {
          indices.push((word >>> (b * bits)) & mask);
        }
      }
    }

    const palCount = data[pos] | (data[pos+1]<<8) | (data[pos+2]<<16) | (data[pos+3]<<24);
    pos += 4;
    // Sanity check: palette shouldn't be absurdly large
    if (palCount < 0 || palCount > 4096) {
      console.warn(`Skipping storage: invalid palette count ${palCount}`);
      break;
    }
    const palette = [];
    for (let p = 0; p < palCount; p++) {
      if (pos >= data.length) break;
      const result = parseNbtPaletteEntry(data, pos);
      palette.push(result.name);
      pos = result.pos;
    }

    if (s === 0) {
      blocks = indices.map(i => palette[i] || 'minecraft:air');
    }
  }
  return blocks || new Array(4096).fill('minecraft:air');
}


function parseNbtPaletteEntry(data, pos) {
  const tag = data[pos++]; // 0x0a
  const nl = data[pos] | (data[pos+1]<<8); pos += 2;
  pos += nl; // skip name
  let name = 'minecraft:air';

  while (pos < data.length) {
    const et = data[pos++];
    if (et === 0) break;
    const enl = data[pos] | (data[pos+1]<<8); pos += 2;
    const en = new TextDecoder().decode(data.slice(pos, pos+enl)); pos += enl;

    if (et === 8) { // STRING
      const vl = data[pos] | (data[pos+1]<<8); pos += 2;
      const val = new TextDecoder().decode(data.slice(pos, pos+vl)); pos += vl;
      if (en === 'name') name = val;
    } else if (et === 1) { pos += 1; }
    else if (et === 2) { pos += 2; }
    else if (et === 3 || et === 5) { pos += 4; }
    else if (et === 4 || et === 6) { pos += 8; }
    else if (et === 7) { // BYTE_ARRAY
      const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4 + al;
    } else if (et === 11) { // INT_ARRAY
      const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4 + al*4;
    } else if (et === 12) { // LONG_ARRAY
      const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4 + al*8;
    } else if (et === 0x0a) { // nested compound (states)
      let depth = 1;
      while (depth > 0 && pos < data.length) {
        const ct = data[pos++];
        if (ct === 0) { depth--; continue; }
        const cnl = data[pos] | (data[pos+1]<<8); pos += 2 + cnl;
        if (ct === 1) pos += 1;
        else if (ct === 2) pos += 2;
        else if (ct === 3 || ct === 5) pos += 4;
        else if (ct === 4 || ct === 6) pos += 8;
        else if (ct === 8) { const sl = data[pos]|(data[pos+1]<<8); pos += 2+sl; }
        else if (ct === 7) { const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4+al; }
        else if (ct === 11) { const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4+al*4; }
        else if (ct === 12) { const al = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4+al*8; }
        else if (ct === 0x0a) depth++;
        else if (ct === 9) {
          const let2 = data[pos++];
          const ll = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4;
          for (let i2 = 0; i2 < ll; i2++) {
            if (let2 === 8) { const sl = data[pos]|(data[pos+1]<<8); pos += 2+sl; }
            else if (let2 === 1) pos += 1;
            else if (let2 === 3 || let2 === 5) pos += 4;
            else if (let2 === 4 || let2 === 6) pos += 8;
          }
        }
      }
    } else if (et === 9) { // list
      const let2 = data[pos++];
      const ll = data[pos]|(data[pos+1]<<8)|(data[pos+2]<<16)|(data[pos+3]<<24); pos += 4;
      for (let i2 = 0; i2 < ll; i2++) {
        if (let2 === 8) { const sl = data[pos]|(data[pos+1]<<8); pos += 2+sl; }
        else if (let2 === 1) pos += 1;
        else if (let2 === 3 || let2 === 5) pos += 4;
      }
    }
  }
  return { name, pos };
}

function keyCC(s, i) { return s.charCodeAt(i) & 0xff; }

function keyInt32(s, off) {
  return (keyCC(s,off) | (keyCC(s,off+1)<<8) | (keyCC(s,off+2)<<16) | (keyCC(s,off+3)<<24)) | 0;
}

async function scanAllBlocks(onProgress) {
  if (!window.__loadedDb) return { counts:{}, blockToChunks:{} };
  const counts = {};
  const blockToChunks = {};

  const subchunkKeys = Object.entries(window.__loadedDb).filter(([keyStr]) => {
    const len = keyStr.length;
    if (len !== 10 && len !== 14) return false;
    const tagIdx = len === 10 ? 8 : 12;
    return keyCC(keyStr, tagIdx) === 0x2f;
  });

  console.log(`Found ${subchunkKeys.length} sub-chunk keys`);

  const BATCH = 1;
  for (let i = 0; i < subchunkKeys.length; i += BATCH) {
    const batch = subchunkKeys.slice(i, i + BATCH);
    for (const [keyStr, val] of batch) {
      const cx = keyInt32(keyStr, 0);
      const cz = keyInt32(keyStr, 4);
      try {
        const blocks = parseSubchunk(val);
        if (!blocks) continue;
        for (const b of blocks) {
          if (!b || b === '') continue;
          counts[b] = (counts[b]||0) + 1;
          if (!blockToChunks[b]) blockToChunks[b] = new Set();
          blockToChunks[b].add(`${cx},${cz}`);
        }
      } catch(e) { console.warn(`subchunk (${cx},${cz}) parse error:`, e.message); }
    }
    if (onProgress) onProgress(Math.min(i + BATCH, subchunkKeys.length), subchunkKeys.length);
    showStatus(`Scanning sub-chunks: ${Math.min(i+1,subchunkKeys.length)}/${subchunkKeys.length}...`);
    await new Promise(r => setTimeout(r, 16));
  }
  return { counts, blockToChunks };
}

function getAllChunkCoords() {
  if (!window.__loadedDb) return [];
  const seen = new Set();
  const coords = [];
  const CHUNK_TAGS = new Set([0x2b,0x2c,0x2d,0x2e,0x2f,0x30,0x31,0x32,0x33,0x35,0x36,0x39,0x3a,0x3b,0x3f,0x40,0x41]);
  for (const keyStr of Object.keys(window.__loadedDb)) {
    const len = keyStr.length;
    // Overworld: 9 (x+z+tag) or 10 (x+z+tag+extra)
    // Nether/End: 13 (x+z+dim+tag) or 14 (x+z+dim+tag+extra)
    if (len !== 8 && len !== 9 && len !== 10 && len !== 12 && len !== 13 && len !== 14) continue;
    const tagIdx = (len <= 10) ? 8 : 12;
    // len 8 or 12 = coord-only keys (no tag byte) — count them as chunk keys unconditionally
    if (len !== 8 && len !== 12 && !CHUNK_TAGS.has(keyCC(keyStr, tagIdx))) continue;
    const cx = keyInt32(keyStr, 0);
    const cz = keyInt32(keyStr, 4);
    if (Math.abs(cx) < 1000000 && Math.abs(cz) < 1000000) {
      const key = `${cx},${cz}`;
      if (!seen.has(key)) { seen.add(key); coords.push([cx, cz]); }
    }
  }
  return coords;
}

    let selectedChunks=new Set(), chunkCoords=[];

    function updateInfo() {
      infoDiv.textContent = selectedChunks.size === 0
        ? 'No chunks selected. Tap tiles or use buttons above.'
        : `${selectedChunks.size} chunk(s) selected.`;
    }

    function getChunkFromEvent(e, canvas) {
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      const px = Math.floor((clientX - rect.left) * canvas.width / rect.width / cellSize);
      const pz = Math.floor((clientY - rect.top) * canvas.height / rect.height / cellSize);
      const cx = (canvas._minX || 0) + px;
      const cz = (canvas._minZ || 0) + pz;
      return `${cx},${cz}`;
    }

    function drawMap() {
      if(!chunkCoords.length) return;
      const xs=chunkCoords.map(([x])=>x), zs=chunkCoords.map(([,z])=>z);
      const minX=Math.min(...xs),maxX=Math.max(...xs),minZ=Math.min(...zs),maxZ=Math.max(...zs);
      const w=maxX-minX+1,h=maxZ-minZ+1;
      cellSize=Math.max(6,Math.min(24,Math.floor(320/Math.max(w,h))));
      canvas.width=w*cellSize; canvas.height=h*cellSize;
      canvas._minX=minX; canvas._minZ=minZ;
      const ctx=canvas.getContext('2d');
      ctx.fillStyle='#0d0d0d'; ctx.fillRect(0,0,canvas.width,canvas.height);

      // Draw chunks
      for(const[cx,cz] of chunkCoords){
        const px=(cx-minX)*cellSize, pz=(cz-minZ)*cellSize;
        const key=`${cx},${cz}`;
        const isSel=selectedChunks.has(key);
        ctx.fillStyle=isSel?'#0055aa':'#1a2a1a'; ctx.fillRect(px,pz,cellSize-1,cellSize-1);
        if(isSel){ctx.strokeStyle='#4499ff';ctx.lineWidth=1;ctx.strokeRect(px+0.5,pz+0.5,cellSize-2,cellSize-2);}
      }

      // Grid overlay
      const gridInterval = Math.max(1, Math.ceil(48 / cellSize));
      ctx.save();
      ctx.font = `${Math.max(8, Math.min(10, cellSize-2))}px monospace`;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';

      for(let cx = Math.ceil(minX/gridInterval)*gridInterval; cx <= maxX; cx += gridInterval){
        const px = (cx - minX) * cellSize;
        ctx.strokeStyle = cx === 0 ? 'rgba(255,255,100,0.6)' : 'rgba(255,255,255,0.1)';
        ctx.lineWidth = cx === 0 ? 1.5 : 1;
        ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, canvas.height); ctx.stroke();
        if(cellSize >= 10){
          ctx.fillStyle = cx === 0 ? 'rgba(255,255,100,0.9)' : 'rgba(255,255,255,0.45)';
          ctx.fillText(cx, px+2, 2);
        }
      }
      for(let cz = Math.ceil(minZ/gridInterval)*gridInterval; cz <= maxZ; cz += gridInterval){
        const pz = (cz - minZ) * cellSize;
        ctx.strokeStyle = cz === 0 ? 'rgba(255,255,100,0.6)' : 'rgba(255,255,255,0.1)';
        ctx.lineWidth = cz === 0 ? 1.5 : 1;
        ctx.beginPath(); ctx.moveTo(0, pz); ctx.lineTo(canvas.width, pz); ctx.stroke();
        if(cellSize >= 10){
          ctx.fillStyle = cz === 0 ? 'rgba(255,255,100,0.9)' : 'rgba(255,255,255,0.45)';
          ctx.fillText(cz, 2, pz+2);
        }
      }

      // Mark origin (0,0) if visible
      if(minX <= 0 && maxX >= 0 && minZ <= 0 && maxZ >= 0){
        const ox = (0 - minX) * cellSize, oz = (0 - minZ) * cellSize;
        ctx.fillStyle = 'rgba(255,255,100,0.9)';
        ctx.fillRect(ox + cellSize/2 - 2, oz + cellSize/2 - 2, 4, 4);
      }

      ctx.restore();
    }

    let isDragging = false;
    let dragMode = null; // 'add' or 'remove'

    function handleSelect(key, toggle) {
      if (toggle) {
        if (selectedChunks.has(key)) selectedChunks.delete(key);
        else selectedChunks.add(key);
      } else {
        selectedChunks.add(key);
      }
      pruneBtn.disabled = selectedChunks.size === 0;
      updateInfo();
      drawMap();
    }

    canvas.onclick = (e) => {
      const key = getChunkFromEvent(e, canvas);
      if (!e.shiftKey) selectedChunks.clear();
      handleSelect(key, true);
    };

    // Touch drag to select multiple chunks
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const key = getChunkFromEvent(e, canvas);
      dragMode = selectedChunks.has(key) ? 'remove' : 'add';
      isDragging = true;
      if (dragMode === 'add') selectedChunks.add(key);
      else selectedChunks.delete(key);
      pruneBtn.disabled = selectedChunks.size === 0;
      updateInfo();
      drawMap();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (!isDragging) return;
      const key = getChunkFromEvent(e, canvas);
      if (dragMode === 'add') selectedChunks.add(key);
      else selectedChunks.delete(key);
      pruneBtn.disabled = selectedChunks.size === 0;
      updateInfo();
      drawMap();
    }, { passive: false });

    canvas.addEventListener('touchend', () => { isDragging = false; dragMode = null; });

    // Pinch zoom
    let lastPinchDist = null;
    canvas.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        lastPinchDist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
      }
    }, { passive: true });
    canvas.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && lastPinchDist !== null) {
        e.preventDefault();
        const dist = Math.hypot(
          e.touches[0].clientX - e.touches[1].clientX,
          e.touches[0].clientY - e.touches[1].clientY
        );
        const ratio = dist / lastPinchDist;
        if (Math.abs(ratio - 1) > 0.05) {
          const newSize = Math.max(4, Math.min(48, Math.round(cellSize * ratio)));
          if (newSize !== cellSize) { cellSize = newSize; drawMap(); }
          lastPinchDist = dist;
        }
      }
    }, { passive: false });
    canvas.addEventListener('touchend', () => { lastPinchDist = null; });

    scanBtn.onclick=async ()=>{
      if(!window.__loadedDb){showStatus('No world loaded',true);return;}
      scanBtn.disabled=true; scanBtn.textContent='Scanning...';
      try {
        chunkCoords=getAllChunkCoords();
        const{blockToChunks}=await scanAllBlocks((done,total)=>{
          scanBtn.textContent=`Scanning ${done}/${total}...`;

        drawMap();
        scanBtn.textContent=`Rescan (${chunkCoords.length} chunks)`;
      } catch(e){showStatus(`Scan error: ${e.message}`,true);scanBtn.textContent='Scan & Draw Map';}
      scanBtn.disabled=false;
    };
    pruneBtn.onclick=()=>{const dim=parseInt(dimSelect.value);doPrune([...selectedChunks].map(k=>{const[x,z]=k.split(',').map(Number);return[x,z,dim];}));};
  }

        ctx.lineWidth=cz===0?1.5:1;
        ctx.beginPath();ctx.moveTo(0,pz);ctx.lineTo(bsCanvas.width,pz);ctx.stroke();
        if(bsCellSize>=10){ctx.fillStyle=cz===0?'rgba(255,255,100,0.9)':'rgba(255,255,255,0.45)';ctx.font='9px monospace';ctx.fillText(cz,2,pz+2);}
      }
      if(minX<=0&&maxX>=0&&minZ<=0&&maxZ>=0){
        const ox=(0-minX)*bsCellSize,oz=(0-minZ)*bsCellSize;
        ctx.fillStyle='rgba(255,255,100,0.9)';
        ctx.fillRect(ox+bsCellSize/2-2,oz+bsCellSize/2-2,4,4);
      }
      ctx.restore();
    }

    function bsGetChunk(e) {
      const rect=bsCanvas.getBoundingClientRect();
      const clientX=e.touches?e.touches[0].clientX:e.clientX;
      const clientY=e.touches?e.touches[0].clientY:e.clientY;
      const px=Math.floor((clientX-rect.left)*bsCanvas.width/rect.width/bsCellSize);
      const pz=Math.floor((clientY-rect.top)*bsCanvas.height/rect.height/bsCellSize);
      return `${(bsCanvas._minX||0)+px},${(bsCanvas._minZ||0)+pz}`;
    }

    let bsDragging=false, bsDragMode=null;
    bsCanvas.addEventListener('touchstart',(e)=>{
      e.preventDefault();
      const key=bsGetChunk(e);
      bsDragMode=bsSelectedChunks.has(key)?'remove':'add';
      bsDragging=true;
      if(bsDragMode==='add')bsSelectedChunks.add(key); else bsSelectedChunks.delete(key);
      updateMapLabel(); bsDrawMap();
    },{passive:false});
    bsCanvas.addEventListener('touchmove',(e)=>{
      e.preventDefault();
      if(!bsDragging)return;
      const key=bsGetChunk(e);
      if(bsDragMode==='add')bsSelectedChunks.add(key); else bsSelectedChunks.delete(key);
      updateMapLabel(); bsDrawMap();
    },{passive:false});
    bsCanvas.addEventListener('touchend',()=>{bsDragging=false;bsDragMode=null;});
    bsCanvas.onclick=(e)=>{
      const key=bsGetChunk(e);
      if(bsSelectedChunks.has(key))bsSelectedChunks.delete(key); else bsSelectedChunks.add(key);
      updateMapLabel(); bsDrawMap();
    };

    // --- Scan button ---
    const scanBtn=document.createElement('button'); scanBtn.textContent='Scan All Blocks'; c.appendChild(scanBtn);
    const resultsDiv=document.createElement('div'); resultsDiv.style.marginTop='12px'; c.appendChild(resultsDiv);

    scanBtn.onclick=async ()=>{
      if(!window.__loadedDb){showStatus('No world loaded',true);return;}
      scanBtn.disabled=true; scanBtn.textContent='Scanning...';
      try{
          bsChunkCoords=getAllChunkCoords();
          bsDrawMap();
          const{counts,blockToChunks}=await scanAllBlocks((done,total)=>{scanBtn.textContent=`Scanning ${done}/${total}...`;});
          bsBlockToChunks=blockToChunks;
          const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
          resultsDiv.innerHTML='';
          const total=Object.values(counts).reduce((a,b)=>a+b,0);
          const summ=document.createElement('div'); summ.style.cssText='color:#999;font-size:12px;margin-bottom:10px;';
          summ.textContent=`${sorted.length} unique block types, ${total.toLocaleString()} total blocks`;
          resultsDiv.appendChild(summ);
          const searchInput=document.createElement('input'); searchInput.className='edit-field'; searchInput.placeholder='Filter blocks...'; searchInput.style.marginBottom='8px';
          resultsDiv.appendChild(searchInput);
          const listDiv=document.createElement('div'); resultsDiv.appendChild(listDiv);

          function renderBlockList(filter){
            listDiv.innerHTML='';
            sorted.filter(([n])=>!filter||n.includes(filter)).forEach(([blockName,count])=>{
              const row=document.createElement('div'); row.style.cssText='display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #2a2a2a;flex-wrap:wrap;';
              row.appendChild(createItemIcon('minecraft:'+blockName.replace('minecraft:',''),20));
              const ns=document.createElement('span'); ns.style.cssText='color:#7fd17a;font-size:12px;font-family:monospace;flex:1;'; ns.textContent=blockName; row.appendChild(ns);
              const cs=document.createElement('span'); cs.style.cssText='color:#999;font-size:11px;'; cs.textContent=`${count.toLocaleString()} in ${blockToChunks[blockName]?.size||0} chunk(s)`; row.appendChild(cs);
              const db=document.createElement('button'); db.textContent='Delete'; db.style.cssText='padding:3px 8px;font-size:11px;background:#883333;';
              db.onclick=()=>{
                const scope=bsSelectedChunks.size>0?`in ${bsSelectedChunks.size} selected chunk(s)`:'world-wide';
                if(!confirm(`Delete all ${blockName} ${scope}?`))return;
                applyBlockReplacement(blockName,'minecraft:air',bsSelectedChunks.size>0?bsSelectedChunks:null);
              };
              const rb=document.createElement('button'); rb.textContent='Replace...'; rb.style.cssText='padding:3px 8px;font-size:11px;background:#444;';
              rb.onclick=()=>{
                const t=prompt(`Replace ${blockName} with:`, 'minecraft:air');
                if(!t||!t.trim())return;
                const scope=bsSelectedChunks.size>0?`in ${bsSelectedChunks.size} selected chunk(s)`:'world-wide';
                if(!confirm(`Replace all ${blockName} → ${t.trim()} ${scope}?`))return;
                applyBlockReplacement(blockName,t.trim(),bsSelectedChunks.size>0?bsSelectedChunks:null);
              };
              row.appendChild(db); row.appendChild(rb); listDiv.appendChild(row);
            });
          }
          searchInput.oninput=()=>renderBlockList(searchInput.value.trim().toLowerCase());
          renderBlockList('');
      }catch(e){showStatus(`Scan error: ${e.message}`,true);}
      scanBtn.disabled=false; scanBtn.textContent='Rescan';
    };
  }

  async function applyBlockReplacement(fromBlock, toBlock, chunkScope) {
    if(!currentZip||!currentLogPath){showStatus('No world loaded',true);return;}
    if(!window.__loadedDb){showStatus('No world loaded',true);return;}

    const enc=new TextEncoder();
    const fromBytes=enc.encode(fromBlock);
    const toBytes=enc.encode(toBlock);

    // Find all subchunk keys
    const subchunkKeys=Object.entries(window.__loadedDb).filter(([keyStr])=>{
      const len=keyStr.length;
      if(len!==10&&len!==14)return false;
      const tagIdx=len===10?8:12;
      return keyCC(keyStr,tagIdx)===0x2f;
    });

    let modified=0, skipped=0;
    const newEntries=[]; // [keyBytes, valBytes]

    for(const[keyStr, val] of subchunkKeys){
      const cx=keyInt32(keyStr,0), cz=keyInt32(keyStr,4);
      // If chunk scope is set, skip chunks not in it
      if(chunkScope&&!chunkScope.has(`${cx},${cz}`)){continue;}

      // Raw byte scan: find "08 04 00 name <len> <fromBlock>" pattern in palette NBT and patch it
      // After each splice (different length) we restart the scan on the updated buffer
      const nameKey=new Uint8Array([0x08,0x04,0x00,0x6e,0x61,0x6d,0x65]); // 08 04 00 "name"
      const fromLen=fromBytes.length;
      const fromLenLo=fromLen&0xff, fromLenHi=(fromLen>>8)&0xff;
      let buf=new Uint8Array(val);
      let changed=false;

      let i=0;
      while(i<=buf.length-nameKey.length-2-fromLen){
        // Match nameKey pattern
        let match=true;
        for(let j=0;j<nameKey.length;j++){if(buf[i+j]!==nameKey[j]){match=false;break;}}
        if(!match){i++;continue;}
        const sp=i+nameKey.length;
        // Match length prefix
        if(buf[sp]!==fromLenLo||buf[sp+1]!==fromLenHi){i++;continue;}
        // Match block name bytes
        let nameMatch=true;
        for(let j=0;j<fromLen;j++){if(buf[sp+2+j]!==fromBytes[j]){nameMatch=false;break;}}
        if(!nameMatch){i++;continue;}
        // Found — patch
        if(toBytes.length===fromBytes.length){
          // Same length: in-place patch
          for(let j=0;j<toBytes.length;j++) buf[sp+2+j]=toBytes[j];
          changed=true;
          i=sp+2+toBytes.length; // advance past match
        } else {
          // Different length: splice and restart scan from same position
          const toLen=toBytes.length;
          const patchEnd=sp+2+fromLen;
          const newBuf=new Uint8Array(buf.length-fromLen+toLen);
          newBuf.set(buf.slice(0,sp),0);
          newBuf[sp]=toLen&0xff;
          newBuf[sp+1]=(toLen>>8)&0xff;
          newBuf.set(toBytes,sp+2);
          newBuf.set(buf.slice(patchEnd),sp+2+toLen);
          buf=newBuf;
          changed=true;
          i=sp+2+toLen; // advance past replacement
        }
      }

      if(changed){
        newEntries.push([keyStr, buf]);
        modified++;
      }
    }

    if(!newEntries.length){
      showStatus(`No subchunks contained ${fromBlock} — nothing to change.`);
      return;
    }

    try{
      showStatus(`Writing ${modified} modified subchunk(s)...`);
      // Build a write batch with all modified subchunks
      let seq=currentMaxSeq+1;
      const logData=await currentZip.file(currentLogPath).async('uint8array');
      let newLogData=logData;

      // Write in batches of 100 to avoid huge single log records
      const BATCH=100;
      for(let i=0;i<newEntries.length;i+=BATCH){
        const slice=newEntries.slice(i,i+BATCH);
        const batch=writePutBatch(slice,seq);
        newLogData=appendLogRecord(newLogData,batch);
        seq+=slice.length;
      }

      pushUndo(`Replace ${fromBlock} → ${toBlock}`, logData, currentMaxSeq);
      currentZip.file(currentLogPath,newLogData);
      currentMaxSeq=seq;
      document.getElementById('saveBtn').disabled=false;
      showStatus(`Replaced ${fromBlock} → ${toBlock} in ${modified} subchunk(s). Use Save & Download to apply.`);
    }catch(e){showStatus(`Replace error: ${e.message}`,true);}
  }

  async function doPrune(chunks) {
    if(!currentZip||!currentLogPath){showStatus('No world loaded',true);return;}
    const allKeys=[];
    for(const[cx,cz,dim] of chunks) allKeys.push(...findChunkKeys(window.__loadedDb,cx,cz,dim));
    if(!allKeys.length){showStatus('No chunk keys found for those coordinates',true);return;}
    try{
      showStatus(`Deleting ${allKeys.length} keys for ${chunks.length} chunk(s)...`);
      const batch=writeDeleteBatch(allKeys,currentMaxSeq+1);
      const log=await currentZip.file(currentLogPath).async('uint8array');
      pushUndo(`Prune ${chunks.length} chunk(s)`, log, currentMaxSeq);
      currentZip.file(currentLogPath,appendLogRecord(log,batch));
      currentMaxSeq++;
      document.getElementById('saveBtn').disabled=false;
      showStatus(`Pruned ${chunks.length} chunk(s). Use Save & Download to apply.`);
    }catch(e){showStatus(`Prune error: ${e.message}`,true);}
  }
}

function replaceBlockWorldwide(fromBlock,toBlock){
