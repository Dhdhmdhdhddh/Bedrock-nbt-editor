}


function renderItemList(items, container) {
  if (!Array.isArray(items) || items.length === 0) {
    container.innerHTML = '<div class="empty">Empty</div>';
    return;
  }

  const mode = container.dataset.viewMode || 'grid';
  container.dataset.viewMode = mode;
  container.innerHTML = '';

  const toggleBtn = document.createElement('button');
  toggleBtn.textContent = mode === 'grid' ? 'Switch to List View' : 'Switch to Grid View';
  toggleBtn.style.marginBottom = '12px';
  toggleBtn.onclick = () => {
    container.dataset.viewMode = mode === 'grid' ? 'list' : 'grid';
    renderItemList(items, container);
  };
  container.appendChild(toggleBtn);

  if (mode === 'grid') {
    const grid = document.createElement('div');
    grid.className = 'item-grid';

    const detailDiv = document.createElement('div');
    detailDiv.className = 'item-detail';

    items.forEach((item) => {
      if (!item) return;
      const name = (item.Name?.value || 'minecraft:air').replace('minecraft:', '');
      const slot = item.Slot?.value ?? '?';
      const count = item.Count?.value ?? 0;

      const tile = document.createElement('div');
      tile.className = 'item-tile';
      tile.appendChild(createItemIcon(item.Name?.value, 28));
      const info = document.createElement('div');
      info.innerHTML =
        `<div class="item-tile-slot">Slot ${slot}</div>` +
        `<div class="item-tile-name">${name}</div>` +
        `<div class="item-tile-count">x${count}</div>`;
      tile.appendChild(info);
      tile.onclick = () => {
        document.querySelectorAll('.item-tile').forEach(t => t.classList.remove('selected'));
        tile.classList.add('selected');
        detailDiv.innerHTML = '';
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        renderSingleItem(item, itemDiv);
        detailDiv.appendChild(itemDiv);
      };
      grid.appendChild(tile);
    });

    container.appendChild(grid);
    container.appendChild(detailDiv);
  } else {
    const list = document.createElement('div');
    list.className = 'item-list';
    for (const item of items) {
      if (!item) continue;
      const itemDiv = document.createElement('div');
      itemDiv.className = 'item';
      renderSingleItem(item, itemDiv);
      list.appendChild(itemDiv);
    }
    container.appendChild(list);
  }
}

function renderList(node, container) {
  const items = node.value.items;
  const elemType = node.value.type;

  if (!items || items.length === 0) {
    container.innerHTML = '<div class="empty">Empty</div>';
    return;
  }

  const wrap = document.createElement('div');

  if (elemType === TAG.COMPOUND) {
    items.forEach((item, idx) => {
      const entry = document.createElement('div');
      entry.style.marginBottom = '12px';
      entry.style.paddingBottom = '12px';
      entry.style.borderBottom = '1px solid #3a3a3a';

      const label = document.createElement('div');
      label.className = 'property-key';
      label.style.marginBottom = '6px';
      label.textContent = `[${idx}]`;
      entry.appendChild(label);

      renderCompound(item, entry);
      wrap.appendChild(entry);
    });
  } else {
    items.forEach((item, idx) => {
      const p = document.createElement('div');
      p.className = 'property';

      const k = document.createElement('div');
      k.className = 'property-key';
      k.textContent = `[${idx}]`;

      const val = document.createElement('div');
      val.className = 'property-value';
      val.textContent = String(item);

      if (EDITABLE_TYPES.includes(elemType)) {
        val.classList.add('editable');
        const proxyNode = { type: elemType, value: item };
        val.onclick = () => editValue(proxyNode, val, () => { items[idx] = proxyNode.value; });
      }

      p.appendChild(k);
      p.appendChild(val);
      wrap.appendChild(p);
    });
  }

  container.appendChild(wrap);
}

function openEnchantModal(item, container) {
  const existing = {};
  (item.tag?.value?.ench?.value?.items || []).forEach(e => { existing[e.id.value] = e.lvl.value; });

  const overlay = document.createElement('div');
  overlay.className = 'ench-overlay';

  const panel = document.createElement('div');
  panel.className = 'ench-panel';

  const title = document.createElement('h3');
  title.textContent = 'Enchantments';
  panel.appendChild(title);

  const rows = {};
  for (const [id, name] of ENCHANTMENTS) {
    const row = document.createElement('div');
    row.className = 'ench-row';

    const checkbox = document.createElement('input');
    checkbox.type = 'checkbox';
    checkbox.checked = existing.hasOwnProperty(id);

    const label = document.createElement('label');
    label.textContent = name;

    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = '-32768';
    slider.max = '32767';
    slider.value = existing.hasOwnProperty(id) ? existing[id] : 1;

    const numInput = document.createElement('input');
    numInput.type = 'number';
    numInput.min = '-32768';
    numInput.max = '32767';
    numInput.value = slider.value;

    slider.oninput = () => { numInput.value = slider.value; };
    numInput.oninput = () => {
      let v = parseInt(numInput.value, 10);
      if (isNaN(v)) v = 0;
      v = Math.max(-32768, Math.min(32767, v));
      slider.value = v;
    };

    row.appendChild(checkbox);
    row.appendChild(label);
    row.appendChild(slider);
    row.appendChild(numInput);
    panel.appendChild(row);

    rows[id] = { checkbox, numInput };
  }

  const btnRow = document.createElement('div');
  btnRow.className = 'ench-btn-row';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'Cancel';
  cancelBtn.className = 'cancel';
  cancelBtn.onclick = () => overlay.remove();

  const applyBtn = document.createElement('button');
  applyBtn.textContent = 'Apply';
  applyBtn.onclick = () => {
    const list = ensureEnchList(item);
    list.length = 0;
    for (const [id] of ENCHANTMENTS) {
      const { checkbox, numInput } = rows[id];
      if (checkbox.checked) {
        let lvl = parseInt(numInput.value, 10);
        if (isNaN(lvl)) lvl = 1;
        lvl = Math.max(-32768, Math.min(32767, lvl));
        list.push({
          id: { type: TAG.SHORT, value: id },
          lvl: { type: TAG.SHORT, value: lvl }
        });
      }
    }
    overlay.remove();
    renderEnchantSection(item, container);
  };

  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(applyBtn);
  panel.appendChild(btnRow);

  overlay.appendChild(panel);
  document.body.appendChild(overlay);
}

function getNestedCompound(item, pathArr) {
  let cur = ensureTag(item);
  for (const key of pathArr) {
    if (!cur[key]) cur[key] = { type: TAG.COMPOUND, value: {} };
    cur = cur[key].value;
  }
  return cur;
}

function peekNestedCompound(item, pathArr) {
  let cur = item.tag?.value;
  if (!cur) return null;
  for (const key of pathArr) {
    cur = cur[key]?.value;
    if (!cur) return null;
  }
  return cur;
}

function ensureStringList(compound, key) {
  if (!compound[key]) compound[key] = { type: TAG.LIST, value: { type: TAG.STRING, items: [] } };
  return compound[key].value.items;
}

function renderStringListSection(item, pathArr, key, label, container) {
  function refresh() {
    container.innerHTML = '';
    const title = document.createElement('div');
    title.className = 'property-key';
    title.style.marginTop = '10px';
    title.style.marginBottom = '6px';
    title.textContent = label;
    container.appendChild(title);

    const compound = peekNestedCompound(item, pathArr);
    const list = compound?.[key]?.value?.items || [];

    if (list.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty';
      empty.style.padding = '8px';
      empty.textContent = 'None';
      container.appendChild(empty);
    } else {
      list.forEach((str, idx) => {
        const row = document.createElement('div');
        row.className = 'property';

        const k = document.createElement('div');
        k.className = 'property-key';
        k.textContent = `[${idx}]`;

        const valWrap = document.createElement('div');
        valWrap.style.display = 'flex';
        valWrap.style.gap = '8px';
        valWrap.style.alignItems = 'center';

        const val = document.createElement('div');
        val.className = 'property-value editable';
        val.style.flex = '1';
        val.textContent = str;
        const proxy = { type: TAG.STRING, value: str };
        val.onclick = () => editValue(proxy, val, () => { list[idx] = proxy.value; });

        const removeBtn = document.createElement('button');
        removeBtn.textContent = 'Remove';
        removeBtn.onclick = () => { list.splice(idx, 1); refresh(); };

        valWrap.appendChild(val);
        valWrap.appendChild(removeBtn);
        row.appendChild(k);
        row.appendChild(valWrap);
        container.appendChild(row);
      });
    }

    const addBtn = document.createElement('button');
    addBtn.textContent = `+ Add Entry`;
    addBtn.style.marginTop = '8px';
    addBtn.onclick = () => {
      const realCompound = getNestedCompound(item, pathArr);
      const realList = ensureStringList(realCompound, key);
      realList.push('');
      refresh();
    };
    container.appendChild(addBtn);
  }
  refresh();
}

function ensureInventoryList() {

    currentPlayerNBT.value.Inventory = { type: TAG.LIST, value: { type: TAG.COMPOUND, items: [] } };
  }
  return currentPlayerNBT.value.Inventory.value.items;
}

function placeInInventory(itemCompound, slot) {
  const items = ensureInventoryList();
  const idx = items.findIndex(it => it.Slot?.value === slot);
  if (idx >= 0) items[idx] = itemCompound;
  else items.push(itemCompound);
}

    renderItemList(currentPlayerNBT.value.Inventory.value.items, content);

function buildFillerItems(name, count) {
  const items = [];
  for (let s = 0; s < 27; s++) {
    items.push({
      Name: { type: TAG.STRING, value: name },
      Count: { type: TAG.BYTE, value: count },
      Slot: { type: TAG.BYTE, value: s },
      Damage: { type: TAG.SHORT, value: 0 }
    });
  }
  return items;
}

function buildShulkerItem(slot, contentsItems, shulkerName) {
  return {
    Name: { type: TAG.STRING, value: shulkerName },
    Count: { type: TAG.BYTE, value: 1 },
    Slot: { type: TAG.BYTE, value: slot },
    Damage: { type: TAG.SHORT, value: 0 },
    tag: { type: TAG.COMPOUND, value: {
      Items: { type: TAG.LIST, value: { type: TAG.COMPOUND, items: contentsItems } }
    }}
  };
}

function buildNestedShulker(depth, fillerName, fillCount, shulkerName, slot) {
  let contents = buildFillerItems(fillerName, fillCount);
  for (let level = 1; level < depth; level++) {
    const inner = buildShulkerItem(0, contents, shulkerName);
    contents = [inner];
  }
  return buildShulkerItem(slot, contents, shulkerName);
}

function buildArmorItem(identifier, trimPattern, trimMaterial, slot) {
  const item = {
    Name: { type: TAG.STRING, value: identifier.includes(':') ? identifier : `minecraft:${identifier}` },
    Count: { type: TAG.BYTE, value: 1 },
    Slot: { type: TAG.BYTE, value: slot },
    Damage: { type: TAG.SHORT, value: 0 }
  };
  if (trimPattern && trimMaterial) {
    item.tag = { type: TAG.COMPOUND, value: {
      Trim: { type: TAG.COMPOUND, value: {
        Pattern: { type: TAG.STRING, value: `minecraft:${trimPattern}` },
        Material: { type: TAG.STRING, value: `minecraft:${trimMaterial}` }
      }}
    }};
  }
  return item;
}

function renderStatsTab(container, playerData) {
  container.innerHTML = '';

  const makeSection = (label) => {
    const h = document.createElement('div');
    h.style.cssText = 'color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;border-bottom:1px solid #2a2a2a;padding-bottom:4px;';

    if (playerData.PlayerGameMode) playerData.PlayerGameMode.value = parseInt(gmSelect.value);

  // XP
  makeSection('Experience');

  progInp.oninput = () => { if (playerData.PlayerLevelProgress) playerData.PlayerLevelProgress.value = (parseFloat(progInp.value) || 0) / 100; };

  // Health & Hunger (from Attributes list)
  const attrs = playerData.Attributes?.value?.items || [];
  const getAttr = (name) => attrs.find(a => a.value?.Name?.value === name || (typeof a === 'object' && a.Name?.value === name));

  // Attributes items are compound objects from the NBT reader
  // Structure: { type: TAG.COMPOUND, value: { Name: {type,value}, Current: {type,value}, ... } }
  makeSection('Health & Hunger');

  const healthAttr = attrs.find(a => a.value?.Name?.value === 'minecraft:health');
  if (healthAttr) {
    const hp = makeInput(healthAttr.value.Current?.value ?? 20, 'number');
    hp.step = '0.5'; hp.min = '0'; hp.max = healthAttr.value.Max?.value ?? 20;
    makeRow('Health', hp);
    hp.oninput = () => { if (healthAttr.value.Current) healthAttr.value.Current.value = parseFloat(hp.value) || 0; };
    const maxHp = makeInput(healthAttr.value.Max?.value ?? 20, 'number');
    maxHp.step = '0.5'; maxHp.min = '0';
    makeRow('Max Health', maxHp);
    maxHp.oninput = () => { if (healthAttr.value.Max) healthAttr.value.Max.value = parseFloat(maxHp.value) || 20; };
  }

  const hungerAttr = attrs.find(a => a.value?.Name?.value === 'minecraft:player.hunger');
  if (hungerAttr) {
    const hng = makeInput(hungerAttr.value.Current?.value ?? 20, 'number');
    hng.min = '0'; hng.max = '20';
    makeRow('Hunger', hng);
    hng.oninput = () => { if (hungerAttr.value.Current) hungerAttr.value.Current.value = parseFloat(hng.value) || 0; };
  }

  const satAttr = attrs.find(a => a.value?.Name?.value === 'minecraft:player.saturation');
  if (satAttr) {
    const sat = makeInput(satAttr.value.Current?.value ?? 5, 'number');
    sat.step = '0.5'; sat.min = '0'; sat.max = '20';
    makeRow('Saturation', sat);
    sat.oninput = () => { if (satAttr.value.Current) satAttr.value.Current.value = parseFloat(sat.value) || 0; };
  }

  // Misc
  makeSection('Misc');
  const airInp = makeInput(playerData.Air?.value ?? 300, 'number');
  airInp.min = '0'; airInp.max = '300';
  makeRow('Air', airInp);
  airInp.oninput = () => { if (playerData.Air) playerData.Air.value = parseInt(airInp.value) || 0; };

  const invulInp = document.createElement('input');
  invulInp.type = 'checkbox';
  invulInp.checked = !!(playerData.Invulnerable?.value);
  invulInp.onchange = () => { if (playerData.Invulnerable) playerData.Invulnerable.value = invulInp.checked ? 1 : 0; };
  makeRow('Invulnerable', invulInp);

  const note = document.createElement('p');
  note.style.cssText = 'color:#666;font-size:11px;margin-top:16px;';
  note.textContent = 'Changes here apply when you click Save & Download World.';
  container.appendChild(note);
}

function renderEntitiesTab(container) {
  container.innerHTML = '';

  const db = window.__loadedDb;
  if (!db) {
    container.textContent = 'No world loaded.';
    return;
  }

  // Collect all actorprefix keys
  const actorPfx = 'actorprefix';
  const actorEntries = Object.entries(db).filter(([k]) => {
    // actorprefix in latin1
    for (let i = 0; i < actorPfx.length; i++) {
      if (k.charCodeAt(i) !== actorPfx.charCodeAt(i)) return false;
    }
    return k.length > actorPfx.length;
  });

  if (!actorEntries.length) {
    container.textContent = 'No entities found in world.';
    return;
  }

  // Parse each entity NBT to get identifier
  function getEntityIdentifier(val) {
    try {
      const reader = new NBTReader(val);
      const root = reader.readRoot();
      const fields = root.value || root;
      if (fields.identifier) return fields.identifier.value || 'unknown';
    } catch (_) {}
    // Fallback: raw string scan
    const enc = new TextEncoder();
    const needle = enc.encode('identifier');
    const u = val instanceof Uint8Array ? val : new Uint8Array(val.buffer || val);
    for (let i = 0; i < u.length - needle.length - 3; i++) {
      let match = true;
      for (let j = 0; j < needle.length; j++) if (u[i+1+2+j] !== needle[j]) { match = false; break; }
      if (match && u[i] === 0x08) {
        const nl = u[i+1] | (u[i+2] << 8);
        if (nl === needle.length) {
          const sp = i + 3 + nl;
          const sl = u[sp] | (u[sp+1] << 8);
          if (sl > 0 && sl < 100) return new TextDecoder().decode(u.slice(sp+2, sp+2+sl));
        }
      }
    }
    return 'unknown';
  }

  // Group by identifier
  const byType = {};
  for (const [keyStr, val] of actorEntries) {
    const id = getEntityIdentifier(val);
    if (!byType[id]) byType[id] = [];
    byType[id].push([keyStr, val]);
  }

  const title = document.createElement('h3');
  title.textContent = `Entities (${actorEntries.length} total)`;
  title.style.marginTop = '0';
  container.appendChild(title);

  // List view: grouped by type
  const listDiv = document.createElement('div');
  listDiv.id = 'entity-list';
  container.appendChild(listDiv);

  const editorDiv = document.createElement('div');
  editorDiv.id = 'entity-editor';
  editorDiv.style.display = 'none';
  container.appendChild(editorDiv);

  function showList() {
    listDiv.style.display = '';
    editorDiv.style.display = 'none';
    editorDiv.innerHTML = '';
  }

  function renderEntityList() {
    listDiv.innerHTML = '';
    const searchInput = document.createElement('input');
    searchInput.className = 'edit-field';
    searchInput.placeholder = 'Filter by type...';
    searchInput.style.marginBottom = '8px';
    listDiv.appendChild(searchInput);

    const typeListDiv = document.createElement('div');
    listDiv.appendChild(typeListDiv);

    function renderTypes(filter) {
      typeListDiv.innerHTML = '';
      const sorted = Object.entries(byType).sort((a, b) => b[1].length - a[1].length);
      for (const [id, entries] of sorted) {
        if (filter && !id.includes(filter)) continue;
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #2a2a2a;cursor:pointer;';
        row.appendChild(createItemIcon('minecraft:' + id.replace('minecraft:', ''), 24));
        const nameSpan = document.createElement('span');
        nameSpan.style.cssText = 'color:#7fd17a;font-size:13px;font-family:monospace;flex:1;';
        nameSpan.textContent = id;
        const countSpan = document.createElement('span');
        countSpan.style.cssText = 'color:#888;font-size:12px;';
        countSpan.textContent = `${entries.length}×`;
        row.appendChild(nameSpan);
        row.appendChild(countSpan);

        if (entries.length === 1) {
          row.onclick = () => openEntityEditor(entries[0][0], entries[0][1], id);
        } else {
          // Show sub-list of individual entities
          row.onclick = () => {
            typeListDiv.innerHTML = '';
            const backBtn = document.createElement('button');
            backBtn.textContent = '← Back';
            backBtn.style.marginBottom = '8px';
            backBtn.onclick = () => renderTypes(filter);
            typeListDiv.appendChild(backBtn);

            const subLabel = document.createElement('div');
            subLabel.style.cssText = 'color:#aaa;font-size:12px;margin-bottom:8px;';
            subLabel.textContent = `${entries.length} ${id} entities:`;
            typeListDiv.appendChild(subLabel);

            entries.forEach(([keyStr, val], idx) => {
              // Try to get position
              let posStr = '';
              try {
                const reader = new NBTReader(val);
                const root = reader.readRoot();
                const f = root.value || root;
                if (f.Pos && f.Pos.value && f.Pos.value.items) {
                  const items = f.Pos.value.items;
                  if (items.length >= 3) {
                    posStr = ` @ ${items[0].value.toFixed(1)}, ${items[1].value.toFixed(1)}, ${items[2].value.toFixed(1)}`;
                  }
                }
                if (!posStr && f.CustomName && f.CustomName.value) posStr = ` "${f.CustomName.value}"`;
              } catch (_) {}

              const subRow = document.createElement('div');
              subRow.style.cssText = 'padding:6px 8px;border-bottom:1px solid #222;cursor:pointer;color:#ccc;font-size:12px;font-family:monospace;';
              subRow.textContent = `#${idx+1}${posStr}`;
              subRow.onclick = () => openEntityEditor(keyStr, val, id);
              typeListDiv.appendChild(subRow);
            });
          };
        }
        typeListDiv.appendChild(row);
      }
    }

    searchInput.oninput = () => renderTypes(searchInput.value.trim().toLowerCase());
    renderTypes('');
  }

  function openEntityEditor(keyStr, val, entityId) {
    listDiv.style.display = 'none';

    let nbt;

      inp.style.flex = '1';
      inp.oninput = () => onChange(inp.value);

      row.appendChild(inp);

    const section = (label) => {
      const h = document.createElement('div');
      h.style.cssText = 'color:#888;font-size:11px;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;border-bottom:1px solid #2a2a2a;padding-bottom:4px;';
      h.textContent = label;
      editorDiv.appendChild(h);
    };

    section('Identity');

    // Name tag
    const customName = fields.CustomName?.value || '';
    editorDiv.appendChild(makeField('Name Tag', customName, v => {
      if (!fields.CustomName) fields.CustomName = { type: TAG.STRING, value: '' };
      fields.CustomName.value = v;
    }));

    // Position — list items are raw numbers, not {value:n}
    if (fields.Pos?.value?.items?.length >= 3) {
      section('Position');
      const posItems = fields.Pos.value.items;
      ['X', 'Y', 'Z'].forEach((axis, i) => {
        editorDiv.appendChild(makeField(axis, (posItems[i] ?? 0).toFixed(4), v => {

        }));
      });

    if (fields.Rotation?.value?.items?.length >= 2) {

      const rotItems = fields.Rotation.value.items;
      ['Yaw', 'Pitch'].forEach((axis, i) => {

        }));
      });

    // Health — stored as {type, value: number}
    if (fields.Health !== undefined) {
      section('Stats');
      editorDiv.appendChild(makeField('Health', fields.Health.value ?? fields.Health, v => {
        if (typeof fields.Health === 'object') fields.Health.value = parseFloat(v) || 0;
        else fields.Health = parseFloat(v) || 0;
      }));
    }

    // Inventory (chest minecart, llama, etc.)
    const invField = fields.ChestItems || fields.Items;
    if (invField?.value?.items?.length) {
      section('Inventory');

    }

    // Action buttons row
    const btnRow = document.createElement('div');

    const saveBtn = document.createElement('button');
    saveBtn.textContent = 'Stage Changes';
    saveBtn.style.cssText = 'background:#336633;';
    saveBtn.onclick = async () => {
      if (!currentZip || !currentLogPath) { showStatus('No world loaded', true); return; }
      try {
        const writer = new NBTWriter();
        const newBytes = writer.writeRoot(nbt);
        const logData = await currentZip.file(currentLogPath).async('uint8array');
        const batch = writePutBatch([[keyStr, newBytes]], currentMaxSeq + 1);
        pushUndo(`Edit entity ${entityId}`, logData, currentMaxSeq);
        currentZip.file(currentLogPath, appendLogRecord(logData, batch));
        currentMaxSeq++;
        document.getElementById('saveBtn').disabled = false;
        showStatus('Entity changes staged. Use Save & Download to apply.');
      } catch (e) { showStatus(`Save error: ${e.message}`, true); }
    };

    // Teleport to player
    const teleBtn = document.createElement('button');
    teleBtn.textContent = '📍 Teleport to Player';
    teleBtn.style.cssText = 'background:#336666;';
    teleBtn.onclick = async () => {
      if (!currentZip || !currentLogPath || !currentPlayerNBT) { showStatus('No world loaded', true); return; }
      const pPos = currentPlayerNBT.value?.Pos?.value?.items;
      if (!pPos || pPos.length < 3) { showStatus('Could not read player position', true); return; }
      if (fields.Pos?.value?.items?.length >= 3) {
        fields.Pos.value.items[0] = pPos[0];
        fields.Pos.value.items[1] = pPos[1];
        fields.Pos.value.items[2] = pPos[2];
        // Also trigger save
        try {
          const writer = new NBTWriter();
          const newBytes = writer.writeRoot(nbt);
          const logData = await currentZip.file(currentLogPath).async('uint8array');
          const batch = writePutBatch([[keyStr, newBytes]], currentMaxSeq + 1);
          pushUndo(`Teleport entity ${entityId}`, logData, currentMaxSeq);
          currentZip.file(currentLogPath, appendLogRecord(logData, batch));
          currentMaxSeq++;
          document.getElementById('saveBtn').disabled = false;
          showStatus(`Teleported ${entityId} to player position (${pPos[0].toFixed(1)}, ${pPos[1].toFixed(1)}, ${pPos[2].toFixed(1)}). Use Save & Download to apply.`);
        } catch (e) { showStatus(`Teleport error: ${e.message}`, true); }
      } else {
        showStatus('Entity has no Pos field', true);
      }
    };
    btnRow.appendChild(teleBtn);

    // Delete entity
    const delBtn = document.createElement('button');
    delBtn.textContent = '🗑 Delete Entity';
    delBtn.style.cssText = 'background:#883333;';
    delBtn.onclick = async () => {
      if (!confirm(`Delete this ${entityId}? This cannot be undone after saving.`)) return;
      if (!currentZip || !currentLogPath) { showStatus('No world loaded', true); return; }
      try {
        const logData = await currentZip.file(currentLogPath).async('uint8array');
        const batch = writeDeleteBatch([keyStr], currentMaxSeq + 1);
        pushUndo(`Delete entity ${entityId}`, logData, currentMaxSeq);
        currentZip.file(currentLogPath, appendLogRecord(logData, batch));
        currentMaxSeq++;
        document.getElementById('saveBtn').disabled = false;
        showStatus(`${entityId} deleted. Use Save & Download to apply.`);
        showList();
        renderEntityList();
      } catch (e) { showStatus(`Delete error: ${e.message}`, true); }
    };
    btnRow.appendChild(delBtn);
    editorDiv.appendChild(btnRow);

    // Raw NBT toggle
    const rawLabel = document.createElement('div');
    rawLabel.className = 'property-key';
    rawLabel.style.cssText = 'margin-top:12px;margin-bottom:6px;';
    rawLabel.textContent = 'Raw NBT';
    editorDiv.appendChild(rawLabel);

    const rawToggle = document.createElement('button');
    rawToggle.textContent = 'Show Raw NBT';
    rawToggle.style.cssText = 'padding:4px 10px;font-size:12px;margin-bottom:8px;background:#444;';
    const rawDiv = document.createElement('div');
    rawDiv.style.display = 'none';
    rawDiv.className = 'nbt-tree';
    let rawBuilt = false;
    rawToggle.onclick = () => {
      const visible = rawDiv.style.display !== 'none';
      rawDiv.style.display = visible ? 'none' : 'block';
      rawToggle.textContent = visible ? 'Show Raw NBT' : 'Hide Raw NBT';
      if (!visible && !rawBuilt) {
        rawBuilt = true;
        renderNbtCompound(fields, rawDiv, true);
      }
    };
    editorDiv.appendChild(rawToggle);
    editorDiv.appendChild(rawDiv);
  }

  renderEntityList();
}

function buildIllegalFeature(id, container) {
  container.innerHTML = '';

      const weight = parseInt(weightInp.value)||68;
      const customName = nameInp.value.trim();
      const slot = Math.max(0, Math.min(35, parseInt(slotInp.value)||0));

      // Build innermost bundle content
      function makeContent(innerBundle) {
        const items = [];
        // Fill slots with item if specified
        if (fillItem) {
          for (let i = 0; i < fillSlots; i++) {
            items.push({
              Count: { type: TAG.BYTE, value: fillCount },
              Damage: { type: TAG.SHORT, value: 0 },
              Name: { type: TAG.STRING, value: fillItem },
              Slot: { type: TAG.BYTE, value: i },
              WasPickedUp: { type: TAG.BYTE, value: 0 },
            });
          }
        }
        // Add inner bundle if nesting
        if (innerBundle) {
          const nested = Object.assign({}, innerBundle);
          nested.Slot = { type: TAG.BYTE, value: items.length };
          items.push(nested);
        }
        return items;
      }

      function makeBundle(innerBundle, isOuter) {
        const tagVal = {
          RepairCost: { type: TAG.INT, value: 0 },
          bundle_weight: { type: TAG.INT, value: weight },
        };
        if (customName && isOuter) {
          tagVal.display = { type: TAG.COMPOUND, value: {
            Name: { type: TAG.STRING, value: customName }
          }};
        }
        const contents = makeContent(innerBundle);
        if (contents.length > 0) {
          tagVal.storage_item_component_content = {
            type: TAG.LIST,
            value: { type: TAG.COMPOUND, items: contents }
          };
        }
        return {
          Count: { type: TAG.BYTE, value: 1 },
          Damage: { type: TAG.SHORT, value: 0 },
          Name: { type: TAG.STRING, value: 'minecraft:bundle' },
          Slot: { type: TAG.BYTE, value: slot },
          WasPickedUp: { type: TAG.BYTE, value: 0 },
          tag: { type: TAG.COMPOUND, value: tagVal },
        };
      }

      // Build from innermost outward (depth=1 means just 1 bundle, no nesting)
      let bundle = makeBundle(null, depth === 1);
      for (let i = 2; i <= depth; i++) {
        bundle = makeBundle(bundle, i === depth);
      }
      bundle.Slot = { type: TAG.BYTE, value: slot };

      placeInInventory(bundle, slot);
      refreshInventoryTab();
      showStatus(`Generated ${depth}-deep bundle${customName?' "'+customName+'"':''} in slot ${slot}`);
    };
    container.appendChild(genBtn);
  }

}
function ensureTag(item) {
  if (!item.tag) {
    item.tag = { type: TAG.COMPOUND, value: {} };
  }
  return item.tag.value;
}

function ensureEnchList(item) {
  const tag = ensureTag(item);
  if (!tag.ench) {
    tag.ench = { type: TAG.LIST, value: { type: TAG.COMPOUND, items: [] } };
  }
  return tag.ench.value.items;
}

function renderEnchantSection(item, container) {
  container.innerHTML = '';

  const title = document.createElement('div');
  title.className = 'property-key';
  title.style.marginTop = '10px';
  title.style.marginBottom = '6px';
  title.textContent = 'Enchantments';
  container.appendChild(title);

  const ench = item.tag?.value?.ench?.value?.items || [];

  if (ench.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.style.padding = '8px';
    empty.textContent = 'None';
    container.appendChild(empty);
  } else {
    ench.forEach((entry, idx) => {
      const row = document.createElement('div');
      row.className = 'property';

      const k = document.createElement('div');
      k.className = 'property-key';
      k.textContent = `[${idx}]`;

      const valWrap = document.createElement('div');
      valWrap.style.display = 'flex';
      valWrap.style.gap = '8px';
      valWrap.style.alignItems = 'center';
      valWrap.style.flexWrap = 'wrap';

      const idDiv = document.createElement('div');
      idDiv.className = 'property-value editable';
      idDiv.textContent = `ID ${entry.id.value}`;
      idDiv.onclick = () => editValue(entry.id, idDiv, () => { idDiv.textContent = `ID ${entry.id.value}`; });

      const lvlDiv = document.createElement('div');
      lvlDiv.className = 'property-value editable';
      lvlDiv.textContent = `Lvl ${entry.lvl.value}`;
      lvlDiv.onclick = () => editValue(entry.lvl, lvlDiv, () => { lvlDiv.textContent = `Lvl ${entry.lvl.value}`; });

      const removeBtn = document.createElement('button');
      removeBtn.textContent = 'Remove';
      removeBtn.onclick = () => {
        ench.splice(idx, 1);
        renderEnchantSection(item, container);
      };

      valWrap.appendChild(idDiv);
      valWrap.appendChild(lvlDiv);
      valWrap.appendChild(removeBtn);

      row.appendChild(k);
      row.appendChild(valWrap);
      container.appendChild(row);
    });
  }

  const addBtn = document.createElement('button');
  addBtn.textContent = 'Edit Enchantments';
  addBtn.style.marginTop = '8px';
  addBtn.onclick = () => openEnchantModal(item, container);
  container.appendChild(addBtn);
}

function renderCompound(obj, container) {
  const props = document.createElement('div');
  for (const key in obj) {
    const node = obj[key];
    const p = document.createElement('div');
    p.className = 'property';
    
    const keyDiv = document.createElement('div');
    keyDiv.className = 'property-key';
    keyDiv.textContent = key;
    
    const valDiv = document.createElement('div');
    valDiv.className = 'property-value';
    
    if (Array.isArray(node.value)) {
      valDiv.textContent = `[${node.value.length} items]`;
    } else if (typeof node.value === 'object' && node.value !== null) {
      valDiv.textContent = '[...]';
    } else {
      valDiv.textContent = String(node.value);
      if (EDITABLE_TYPES.includes(node.type)) {
        valDiv.classList.add('editable');
        valDiv.onclick = () => editValue(node, valDiv);
      }
    }
    
    p.appendChild(keyDiv);
    p.appendChild(valDiv);
    props.appendChild(p);
  }
  container.appendChild(props);
}

function editValue(node, element, onSave) {
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'edit-field';
  input.value = String(node.value);
  
  element.replaceWith(input);
  input.focus();
  input.select();

  let saved = false;
  function save() {
    if (saved) return;
    saved = true;
    try {
      let newVal;
      switch (node.type) {
        case TAG.BYTE:
        case TAG.SHORT:
        case TAG.INT:
        case TAG.LONG: {
          newVal = parseInt(input.value, 10);
          if (isNaN(newVal)) throw new Error('Not a valid integer');
          break;
        }
        case TAG.FLOAT:
        case TAG.DOUBLE: {
          newVal = parseFloat(input.value);
          if (isNaN(newVal)) throw new Error('Not a valid number');
          break;
        }
        default:
          newVal = input.value;
      }
      node.value = newVal;
      element.textContent = String(node.value);
      if (input.parentNode) input.replaceWith(element);
      if (onSave) onSave();
    } catch (e) {
      showStatus(`Parse error: ${e.message}`, true);
      if (input.parentNode) input.replaceWith(element);
    }
  }

  input.onblur = save;
  input.onkeypress = (e) => { if (e.key === 'Enter') { saved = false; save(); } };
}

async function saveWorld() {
  if (!currentZip || !currentPlayerNBT || !currentLogPath) {
    showStatus('Nothing loaded to save', true);
    return;
  }

  try {
    showStatus('Saving...');

    // 1. Serialize the edited player NBT back to bytes
    const writer = new NBTWriter();
    const nbtBytes = writer.writeRoot(currentPlayerNBT);

    // 2. Build a LevelDB WriteBatch: 8-byte seq + 4-byte count + (tag, key, value) records
    const newSeq = currentMaxSeq + 1;
    const keyBytes = new TextEncoder().encode(PLAYER_KEY);

    const batchHeader = new Uint8Array(12);
    const bhView = new DataView(batchHeader.buffer);
    bhView.setUint32(0, newSeq, true); // seq, low 32 bits
    bhView.setUint32(4, 0, true);      // seq, high 32 bits
    bhView.setUint32(8, 1, true);      // record count

    const recTag = new Uint8Array([1]); // kTypeValue (put)
    const keyLenVarint = encodeVarint(keyBytes.length);
    const valLenVarint = encodeVarint(nbtBytes.length);

    const writeBatch = concatBytes(batchHeader, recTag, keyLenVarint, keyBytes, valLenVarint, nbtBytes);

    // 3. Append as a new log record (kFullType, with correct CRC32C) to the active .log file
    const logData = await currentZip.file(currentLogPath).async('uint8array');
    const newLogData = appendLogRecord(logData, writeBatch);
    currentZip.file(currentLogPath, newLogData);

    // Re-encode level.dat (World tab settings) if it was loaded
    if (currentLevelNBT && currentLevelDatPath) {
      const lvlWriter = new NBTWriter();
      const lvlBytes = lvlWriter.writeRoot(currentLevelNBT);
      const header = new Uint8Array(8);
      const hv = new DataView(header.buffer);
      hv.setInt32(0, currentLevelDatVersion, true);
      hv.setInt32(4, lvlBytes.length, true);
      const newLevelDat = concatBytes(header, lvlBytes);
      currentZip.file(currentLevelDatPath, newLevelDat);
    }

    // 4. Re-zip and trigger download
    const blob = await currentZip.generateAsync({ type: 'blob', mimeType: 'application/octet-stream' });
    currentMaxSeq = newSeq;
    triggerDownload(blob, 'edited_world.mcworld', 'Saved! Check your downloads folder for edited_world.mcworld');
  } catch (e) {
    showStatus(`Save error: ${e.message}`, true);
  }
}
